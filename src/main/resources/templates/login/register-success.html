<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화담 : 회원가입</title>
    <link rel="icon" type="image/png" th:href="@{/images/common/icon.png}">
    <link rel="stylesheet" th:href="@{/css/login/register-success.css}"
</head>
<body>

    <main>
        <div class="success-container">
            <div class="logo-section">
                <a th:href="@{/}">
                    <img th:src="@{/images/common/title.png}" alt="화담 로고" class="logo-img">
                </a>
            </div>

            <div class="message-section">
                <p><b th:text="${name}">사용자</b>님, 회원가입을 축하합니다!</p>
                <p>가입하신 아이디는 <strong th:text="${username}">testid</strong>입니다.</p>
                <p>화담에서 즐거운 이용되시길 바랍니다.</p>
            </div>

            <div class="button-section">
                <a th:href="@{/login}" class="start-btn">시작하기</a>
            </div>
        </div>
    </main>

</body>
</html>
