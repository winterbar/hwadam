<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>beauminity : 회원가입</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    
    <style>
        body {
            background-color: var(--bg-body);
        }

        .register-main {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            min-height: 100vh;
            padding: 3rem 1rem;
            box-sizing: border-box;
        }

        .register-container {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            transition: background-color 0.3s, border-color 0.3s;
            box-sizing: border-box;
        }

        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .register-logo {
            width: 100%;
            max-width: 270px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-row {
            display: flex;
            gap: 1rem;
            width: 100%;
        }

        .form-row .form-group {
            flex: 1;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dark-muted);
        }

        .form-input {
            width: 100%;
            padding: 0.85rem 1rem;
            font-size: 0.9rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--bg-body);
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s, background-color 0.3s;
            box-sizing: border-box;
        }

        .form-input:focus {
            border-color: var(--color-accent);
        }

        .gender-group {
            display: flex;
            gap: 1.5rem;
            padding: 0.3rem 0;
        }

        .gender-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500 !important;
            color: var(--text-main) !important;
            cursor: pointer;
        }

        .gender-label input[type="radio"] {
            accent-color: var(--color-accent);
            cursor: pointer;
            width: 1.1rem;
            height: 1.1rem;
        }

        .form-select {
            width: 100%;
            padding: 0.85rem 1rem;
            font-size: 0.9rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--bg-body);
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s, background-color 0.3s;
            box-sizing: border-box;
            cursor: pointer;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23868E96' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1rem;
        }

        .form-select:focus {
            border-color: var(--color-accent);
        }

        .register-submit-btn {
            display: block;
            width: 100%;
            background-color: var(--text-main);
            color: var(--bg-card);
            padding: 0.9rem 0;
            font-weight: 700;
            font-size: 0.95rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.15s, transform 0.1s, color 0.3s;
            margin-top: 1.75rem;
        }

        .register-submit-btn:hover {
            background-color: var(--color-accent);
            color: #ffffff;
        }

        .register-submit-btn:active {
            transform: scale(0.99);
        }
    </style>
</head>
<body>

    <main class="register-main">

        <div class="register-container">
            
            <div class="register-header">
                <a th:href="@{/}">
                    <img th:src="@{/images/common/title2.png}" alt="Beauminity" class="register-logo">
                </a>
            </div>

            <form th:action="@{/register}" method="post">
                
                <div class="form-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="아이디를 입력해주세요 (16자 이하)" maxlength="16" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="비밀번호를 입력해주세요 (최소 8자)" minlength="8" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="nickname">닉네임</label>
                        <input type="text" id="nickname" name="nickname" class="form-input" placeholder="닉네임 (12자 이하)" maxlength="12" required>
                    </div>

                    <div class="form-group">
                        <label for="name">이름</label>
                        <input type="text" id="name" name="name" class="form-input" placeholder="이름 (10자 이하)" maxlength="10" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="birthday">생년월일</label>
                    <input type="date" id="birthday" name="birthday" class="form-input" required>
                </div>

                <div class="form-group">
                    <label>성별</label>
                    <div class="gender-group">
                        <label class="gender-label">
                            <input type="radio" name="gender" value="M" required> 남
                        </label>
                        <label class="gender-label">
                            <input type="radio" name="gender" value="F" required> 여
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="example@domain.com" required>
                </div>

                <div class="form-group">
                    <label for="phone">전화번호</label>
                    <input type="tel" id="phone" name="phone" class="form-input" 
                           placeholder="010-XXXX-XXXX" 
                           pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}" 
                           required>
                </div>

                <div class="form-group">
                    <label for="skinType">피부타입</label>
                    <select id="skinType" name="skinType" class="form-select" required>
                        <option value="중성" selected>중성</option>
                        <option value="건성">건성</option>
                        <option value="지성">지성</option>
                        <option value="민감성">민감성</option>
                        <option value="복합성">복합성</option>
                        <option value="수부지">수부지</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="personalColor">퍼스널 컬러</label>
                    <input type="text" id="personalColor" name="personalColor" class="form-input" placeholder="퍼스널 컬러를 입력해주세요 (10자 이하)" maxlength="10" required>
                </div>

                <button type="submit" class="register-submit-btn">회원가입</button>

            </form>

        </div>

    </main>

</body>
</html>
