<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화담 : 회원가입</title>
    <link rel="icon" type="image/png" th:href="@{/images/common/icon.png}">
    <link rel="stylesheet" th:href="@{/css/login/register.css}">
</head>
<body>

    <main>
        <div class="register-container">
            <div class="logo-section">
                <a th:href="@{/}"><img th:src="@{/images/common/title.png}" alt="화담 타이틀 로고"></a>
            </div>
            
            <form th:action="@{/register}" method="post">
                <div class="input-group flex-group" id="has-msg">
                    <div class="input-box" style="flex: 1;">
                        <label>아이디</label>
                        <input type="text" id="username" name="username" placeholder="영어와 숫자 조합 (최대 16자)" pattern="^[a-zA-Z0-9]+$" required autofocus>
                    </div>
                    <button type="button" class="check-btn" disabled>중복확인</button>
                </div>
                <span id="usernameError" class="error-text"></span>

                <div class="input-group" id="has-msg-around">
                    <div class="password-wrapper">
                        <label>비밀번호</label>
                        <input type="password" id="password" name="password" placeholder="영어와 숫자 조합 (최소 8자)" minlength="8" required>
                        <button type="button" id="toggle-password" >
                            <img th:src="@{images/icons/crossed-eye.png}" id="eyeIcon" alt="비밀번호 보기"> 
                        </button>
                    </div>
                </div>

                <div class="input-group flex-group">
                    <div class="input-box">
                        <label>이름</label>
                        <input type="text" id="name" name="name" placeholder="이름 (10자 이하)" maxlength="10" required>
                    </div>
                    <div class="input-box">
                        <label>닉네임</label>
                        <input type="text" id="nickname" name="nickname" placeholder="닉네임 (12자 이하)" maxlength="12" required>
                    </div>
                </div>

                <div class="input-group flex-group">
                    <div class="input-box">
                        <label>생년월일</label>
                        <input type="date" id="birthday" name="birthday" required>
                    </div>
                    <div class="input-box">
                        <label>성별</label>
                        <div class="radio-group">
                            <label for="male"><input type="radio" name="gender" id="gender" value="남" required>남</label>
                            <label for="female"><input type="radio" name="gender" id="gender" value="여" required>여</label>
                        </div>
                    </div>
                </div>

                <div class="input-group flex-group">
                    <div class="input-box">
                        <label>피부타입</label>
                        <select id="skinType" name="skinType" required>
                            <option value="중성">중성</option>
                            <option value="건성">건성</option>
                            <option value="지성">지성</option>
                            <option value="민감성">민감성</option>
                            <option value="복합성">복합성</option>
                            <option value="수부지">수부지</option>
                        </select>
                    </div>
                    <div class="input-box">
                        <label>퍼스널 컬러</label>
                        <select id="personalColor" name="personalColor" required>
                            <option value="봄웜">봄웜</option>
                            <option value="가을웜">가을웜</option>
                            <option value="여름쿨">여름쿨</option>
                            <option value="겨울쿨">겨울쿨</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>이메일</label>
                    <input type="email" id="email" name="email" placeholder="example@naver.com" required>
                </div>
                <div class="input-group">
                    <label>전화번호</label>
                    <input type="tel" id="phone" name="phone" placeholder="010-1234-5678"
                        pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}" required>
                </div>

                <button type="submit" class="register-btn">회원가입</button>
            </form>
        </div>
    </main>

    <script th:src="@{/js/login/register.js}"></script>
</body>
</html>
