<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화담 : 계정 찾기</title>
    <link rel="icon" type="image/png" th:href="@{/images/common/icon.png}">
    <link rel="stylesheet" th:href="@{/css/common/main.css}">
    <link rel="stylesheet" th:href="@{/css/login/find.css}">
</head>
<body>

    <main class="register-main">
        <div class="register-container">
            
            <div class="register-header">
                <a th:href="@{/}">
                    <img th:src="@{/images/common/title.png}" alt="Hwadam" class="register-logo">
                </a>
            </div>

            <div class="find-type-tabs">
                <div class="find-type-tab active" onclick="switchFindType('id')">아이디 찾기</div>
                <div class="find-type-tab" onclick="switchFindType('pw')">비밀번호 찾기</div>
            </div>
            
            <div id="findIdSection" class="find-section active">

                <div class="auth-title">
                    가입하신 이메일로 인증하여 아이디를 찾습니다.
                </div>

                <form th:action="@{/find/send-email}" method="POST" id="emailForm" class="flex-group">
                    <div class="input-box">
                        <input type="email" id="emailInput" name="email" placeholder="example@naver.com" oninput="validateEmail()" required>
                    </div>
                    <button type="submit" id="emailBtn" class="check-btn" disabled>인증 요청</button>
                </form>

                <form th:action="@{/find/verify-email}" method="POST" id="verifyForm" class="flex-group" style="display: none;">
                    <div class="input-box">
                        <input type="hidden" id="hiddenEmailInput" name="email">
                        <input type="text" name="code" id="verifyCode" placeholder="인증번호 6자리" maxlength="6" oninput="validateVerifyBtn()">
                    </div>
                    <button type="submit" id="verifyBtn" class="check-btn" disabled>확인</button>
                </form>

                <div id="timerDisplay" style="display: none;">
                    남은 시간 : 5분 00초
                </div>

            </div>

            <a th:href="@{/login}" class="register-submit-btn back-to-login-btn">로그인으로 돌아가기</a>

        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script th:src="@{/js/login/find.js}"></script>
</body>
</html>
