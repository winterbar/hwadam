<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>beauminity : 로그인</title>
    <link rel="icon" type="image/png" th:href="@{/images/common/icon.png}">
    <link rel="stylesheet" th:href="@{/css/common/main.css}">
    <link rel="stylesheet" th:href="@{/css/login/login.css}">
</head>
<body>

    <main class="login-main">

        <div class="login-container">
            
            <div class="login-header">
                <a th:href="@{/}">
                    <img th:src="@{/images/common/title2.png}" alt="Beauminity" class="login-logo">
                </a>
            </div>

            <form th:action="@{/login}" method="post">
                
                <div class="form-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="아이디를 입력해주세요" required autofocus>

                    <span id="id-validation-msg">
                        아이디는 영문자와 숫자만 입력 가능합니다.
                    </span>
                </div>

                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="비밀번호를 입력해주세요" required>
                
                    <span th:if="${param.error}" class="login-error-text">
                        아이디 또는 비밀번호가 일치하지 않습니다.
                    </span>
                </div>
                    
                <button type="submit" class="login-submit-btn">로그인</button>

            </form>
            
            <div class="login-footer-links">
                <div>
                    <span class="login-register-lead">아직 계정이 없으신가요?</span>
                    <a th:href="@{/register}" class="login-register-link">회원가입</a>
                </div>
                <div class="login-find-links">
                    <a th:href="@{/find(type='id')}">아이디 찾기</a>
                    <span>|</span>
                    <a th:href="@{/find(type='pw')}">비밀번호 찾기</a>
                </div>
            </div>

        </div>

    </main>

    <script th:src="@{/js/login/login.js}"></script>

</body>
</html>
