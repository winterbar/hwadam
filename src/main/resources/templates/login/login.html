<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화담 : 로그인</title>
    <link rel="icon" type="image/png" th:href="@{/images/common/icon.png}">
    <link rel="stylesheet" th:href="@{/css/login/login.css}">
</head>
<body>

    <main>
        <div class="login-container">
            <div class="logo-section">
                <a th:href="@{/}"><img th:src="@{/images/common/title.png}" alt="화담 타이틀 로고"></a>
                <p>화장품을 담다, 화담</p>
            </div>
            
            <form th:action="@{/login}" method="post">
                <div class="input-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" name="username" placeholder="아이디를 입력하세요." required>
                    <span th:if="${param.error}" id="login-error-text">
                        아이디 혹은 비밀번호 일치하지 않습니다.
                    </span>
                </div>
                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요." required>
                        <button type="button" id="toggle-password" >
                            <img th:src="@{images/icons/crossed-eye.png}" id="eyeIcon" alt="비밀번호 보기"> 
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="login-btn">로그인</button>
            </form>

            <div class="auth-links">
                아직 계정이 없으신가요? <a th:href="@{/register}">회원가입</a>
                <br><br>
                <a th:href="@{/find(type='id')}">아이디 찾기</a>
                <span>|</span>
                <a th:href="@{/find(type='pw')}">비밀번호 찾기</a>
            </div>
        </div>
    </main>

    <script th:src="@{/js/login/login.js}"></script>

</body>
</html>
