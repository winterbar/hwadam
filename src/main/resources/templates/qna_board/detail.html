<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${qna.title} + ' - BEAUMINITY'"></title>
    <link rel="stylesheet" th:href="@{/css/common/main.css}">
    <link rel="stylesheet" th:href="@{/css/qna_board/qna_detail.css}">
</head>
<body>

    <header th:replace="~{layout/header :: headerFragment}"></header>

    <main class="detail-layout">
        
        <section class="detail-container">
            
            <div class="post-header">
                <div class="post-category">질문 게시판</div>
                <h1 class="post-title" th:text="${qna.title}"></h1>
                
                <div class="post-meta-info">
                    <div class="meta-left">
                        <span class="meta-author" th:text="|${nickname} (${qna.username})|"></span>
                        <span class="meta-divider">|</span>
                        <span class="meta-date" th:text="${qna.title}"></span>
                    </div>
                    <div class="meta-right">
                        <span>조회수</span> <span th:text="${qna.viewCnt}"></span>
                    </div>
                </div>
            </div>

            <div class="post-content" th:text="${qna.content}">
            </div>

            <!-- 첨부파일 -->
        <div class="info-box" th:if="${flist != null and !#lists.isEmpty(flist)}">
            <!-- <span class="label">첨부파일</span> -->
            <div class="preview-list">
                                
                <div  th:each="file : ${flist}">
                    <div class="preview-item">

                            <!-- 이미지 파일만 출력 -->
                        <img th:if="${#strings.endsWith(
                    file.originalName.toLowerCase(),
                    '.jpg')
                or
                #strings.endsWith(
                    file.originalName.toLowerCase(),
                    '.jpeg')
                or
                #strings.endsWith(
                    file.originalName.toLowerCase(),
                    '.png')
                or
                #strings.endsWith(
                    file.originalName.toLowerCase(),
                    '.gif')}" th:src="@{/download/{id}(id=${file.savedName})}">

                    </div>
                    <div>
                        <!-- 다운로드는 모두 가능. 이전에는 file.id를 넘겼다가 변경 -->
                        <a th:href="@{/download/{id}(id=${file.savedName})}"></a>
                    </div>
                </div>
            </div>
        </div>

        <div class="post-like-section">
                <button type="button" class="btn-like" id="btnLike">
                    <span class="like-icon" id="like-icon" th:data-id="${qna.boardId}">♡</span>
                    <span class="like-count" id="like-count" th:data-id="${likecnt}" th:text="${likecnt}"></span>
                </button>
            </div>

            <div class="post-actions">
                <div class="action-left">
                    <a th:href="@{/board/qna}" class="btn btn-list">목록으로</a>
                </div>
                <div class="action-right">
                    <a th:href="@{|/board/qna/edit/${qna.boardId}|}" class="btn btn-modify">수정</a>
                    <button type="submit" class="btn btn-delete" th:onclick="|deleteBoard(${qna.boardId})|" style="display: inline;">삭제</button>
                    
                </div>
            </div>
        </section>

        <aside class="right-sidebar">
            
            <div class="sidebar-ranking">
                <h4>👑 주간 멤버 랭킹</h4>
                <ul class="ranking-list">
                    <li class="ranking-item">
                        <span class="rank-user"><span class="rank-num">1</span> 그루밍마스터</span>
                        <span class="rank-points">4,250 p</span>
                    </li>
                    <li class="ranking-item">
                        <span class="rank-user"><span class="rank-num">2</span> 훈훈스킨</span>
                        <span class="rank-points">3,980 p</span>
                    </li>
                    <li class="ranking-item">
                        <span class="rank-user"><span class="rank-num">3</span> 올영단골</span>
                        <span class="rank-points">3,410 p</span>
                    </li>
                </ul>
            </div>

            <div class="sidebar-login-link-box">
                <div class="login-link-title">
                    더 많은 정보를 공유해보세요!
                </div>
                <button class="sidebar-move-login-btn" th:onclick="|location.href='@{/login}'|">
                    <img th:src="@{/images/common/symbol.png}" alt="" class="sidebar-login-btn-icon">
                    <span>로그인</span>
                </button>
                <div class="login-link-sub">
                    <div style="margin-bottom: 0.5rem;">
                        <span class="sidebar-login-register-lead">계정이 없으신가요?</span>
                        <a th:href="@{/register}" class="sidebar-login-register-link">회원가입</a>
                    </div>
                    <div>
                        <a th:href="@{/find-id}">아이디 찾기</a> | <a th:href="@{/find-pw}">비밀번호 찾기</a>
                    </div>
                </div>
            </div>

            <a th:href="@{/chatbot}" class="sidebar-chatbot-banner">
                <span class="banner-top-tag">AI COUNSELING</span>
                <div class="banner-title">맞춤형 관리, 어려울 땐<br><span>그루밍 AI 챗봇</span>에게</div>
                <div class="banner-desc">실시간 스킨케어 진단 받기</div>
            </a>
            
        </aside>

        <section class="comment-section">
            <h3>댓글 <span>0</span></h3>
    
            <div class="comment-input-area">
                <textarea placeholder="댓글을 남겨보세요." rows="2"></textarea>
                <button class="btn btn-comment-submit">등록</button>
            </div>
            

            <div class="comment-list">
                <div class="comment-item">
                    <div class="comment-info">
                        <span class="comment-author">그루밍왕초보</span>
                        <span class="comment-date">2026-06-18</span>
                    </div>
                    <div class="comment-content">도움이 많이 되는 정보네요! 감사합니다.</div>
                </div>
            </div>
        </section>

    </main>

    <footer th:replace="~{layout/footer :: footerFragment}"></footer>

</body>
</html>
<script th:src="@{/js/qna/qna_delete.js}"></script>
<script th:src="@{/js/qna/qna_like.js}"></script>
