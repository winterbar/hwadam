<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화담 : 커뮤니티</title>

    <link rel="stylesheet" th:href="@{/css/common/header.css}">
    <link rel="stylesheet" th:href="@{/css/common/main.css}">
    <link rel="stylesheet" th:href="@{/css/common/footer.css}">
    <link rel="stylesheet" th:href="@{/css/community/community_list.css}">
    <link rel="icon" type="image/png" th:href="@{/images/common/icon.png}">
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

    <div th:replace="~{layout/header :: headerFragment}"></div>

    <main>

        <div class="main-left-content">
            
            <section class="board-section">
                <div class="section-header">
                    <h2 th:onclick="|location.href='@{/community}'|">커뮤니티</h2>
                </div>
                
                <div class="board-utility">
                    <button class="write-btn" th:onclick="|location.href='@{/community/write}'|">글쓰기</button>
                    <div class="filter-group">
                        <select id="filter-status" name="category" required>
                            <option value="전체보기" selected>전체보기</option>
                            <option value="자유">자유</option>
                            <option value="질문">질문</option>
                            <option value="꿀팁">꿀팁</option>
                            <option value="공지사항">공지사항</option>
                        </select>
                        <select name="sort" id="filter-sort">
                            <option value="최신순">최신순</option>
                            <option value="조회순">조회순</option>
                        </select>
                        <div class="date-filter">
                            <button type="button" class="date-filter-btn"><i class="fa-regular fa-calendar"></i>날짜 선택</button>

                            <div class="date-popup">

                                <div class="date-field">
                                    <label>시작일</label>
                                    <input type="date" id="startDate">
                                </div>

                                <div class="date-field">
                                    <label>종료일</label>
                                    <input type="date" id="endDate">
                                </div>

                                <button id="dateApply" class="btn-apply">
                                    적용
                                </button>

                            </div>
                        </div>
                    </div>
                </div>

                <table class="board-table">
                    <thead>
                        <tr>
                            <th class="col-num">번호</th>
                            <th class="col-product">카테고리</th>
                            <th class="col-title-head">제목</th>
                            <th class="col-writer">작성자</th>
                            <th class="col-date">작성일</th>
                            <th class="col-hits">조회</th>
                        </tr>
                    </thead>
                    <tbody id="board-list-container">

                        <tr th:if="${pageVO.totalCount <= 0}"><td colspan="6" style="text-align:center;">게시글이 없습니다.</td></tr>

                        <tr th:if="${pageVO.totalCount > 0}" th:each="qna : ${qnaS}">
                            <td class="col-num" th:text="${qna.boardId}"></td>
                            <td class="col-product" th:text="|[${qna.category}]|" style="color: var(--color-accent); font-weight: 800;">[답변대기]</td>
                            <td>
                                <a th:href="@{|/community/${qna.boardId}|}" class="col-title" th:text="${qna.title}"></a>
                                <span class="reply-count" th:text="|[${qna.replyCnt}]|"></span>
                            </td>
                            <td class="col-writer"><span class="writer-text" th:text="${qna.nickname}"></span></td>
                            <td class="col-date" th:text="${#temporals.format(qna.createdAt, 'yyyy.MM.dd')}"></td>
                            <td class="col-hits" th:text="${qna.viewCnt}"></td>
                        </tr>
                    </tbody>
                </table>

                <div class="board-footer">
                    <ul class="pagination" id="pagination-container">
                        <li>
                            <a th:if="${pageVO.prev}" class="page-arrow" th:href="@{/community(page=${pageVO.startPage-1})}">‹</a>
                        </li>
                        <th:block
                            th:if="${pageVO.totalCount > 0}"
                            th:each="num : ${#numbers.sequence(pageVO.startPage, pageVO.endPage)}">
                            <li>
                                <a th:href="@{/community(page=${num})}"
                                th:text="${num}"
                                th:classappend="${pageVO.page == num} ? 'active'"></a>
                            </li>
                        </th:block>
                        <li>
                            <a th:if="${pageVO.next}" class="page-arrow" th:href="@{/community(page=${pageVO.endPage+1})}">›</a>
                        </li>
                    </ul>
                        <div class="search-group">
                            <select id="searchType" name="searchType">
                                <option value="titleContent">제목+내용</option>
                                <option value="title">제목</option>
                                <option value="writer">작성자</option>
                            </select>
                            <input id="keyword" type="text" name="searchStr" placeholder="궁금한 단어를 입력하세요.">
                            <button id="searchBtn" type="button" class="search-btn">검색</button>
                        </div>
                </div>
            </section>

        </div>

    </main>

    <div th:replace="~{layout/footer :: footerFragment}"></div>

</body>
<script th:src="@{/js/qna/qna_filter.js}"></script>
</html>
