<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauminity : 질문 게시판</title>

    <link rel="stylesheet" th:href="@{/css/common/main.css}">
    <link rel="stylesheet" th:href="@{/css/common/board.css}">
    <link rel="stylesheet" th:href="@{/css/qna_board/qna_common.css}">
    <link rel="icon" type="image/png" th:href="@{/images/common/icon.png}">
</head>
<body>

    <div th:replace="~{layout/header :: headerFragment}"></div>

    <main>

        <div class="main-left-content">
            
            <section class="board-section">
                <div class="section-header">
                    <h2 th:onclick="|location.href='@{/board/qna}'|">질문 게시판 <span>피부 고민, 성분 분석 등 무엇이든 집단지성으로 해결하세요!</span></h2>
                    <button class="write-btn" th:onclick="|location.href='@{/board/qna/write}'|">질문하기</button>
                </div>
                
                <div class="board-utility">
                    <div class="filter-group">
                        <select id="filter-status" name="category" required>
                            <option value="전체보기" selected>전체보기</option>
                            <option value="입문">입문</option>
                            <option value="비교">비교</option>
                            <option value="도움요청">도움요청</option>
                            <option value="기타">기타</option>
                        </select>
                        <select name="sort" id="filter-sort">
                            <option value="latest">최신순</option>
                            <option value="hits">조회순</option>
                        </select>
                    </div>
                </div>

                <table class="board-table">
                    <thead>
                        <tr>
                            <th class="col-num">번호</th>
                            <th class="col-product">카테고리</th>
                            <th class="col-title">제목</th>
                            <th class="col-writer">작성자</th>
                            <th class="col-date">작성일</th>
                            <th class="col-hits">조회</th>
                        </tr>
                    </thead>
                    <tbody id="board-list-container">
                        <tr th:each="qna : ${qnaS}">
                            <td class="col-num" th:text="${qna.boardId}"></td>
                            <td class="col-product" th:text="|[${qna.category}]|" style="color: var(--color-accent); font-weight: 800;">[답변대기]</td>
                            <td>
                                <a th:href="@{|/board/qna/${qna.boardId}|}" class="col-title" th:text="${qna.title}"></a>
                                <span class="reply-count" th:text="|[${qna.replyCnt}]|"></span>
                            </td>
                            <td class="col-writer" th:text="${qna.nickname}"></td>
                            <td class="col-date" th:text="${#temporals.format(qna.createdAt, 'yyyy.MM.dd')}"></td>
                            <td class="col-hits" th:text="${qna.viewCnt}"></td>
                        </tr>
                        <!--
                        <tr>
                            <td class="col-num">101</td>
                            <td class="col-product" style="color: var(--text-muted); font-weight: 500;">[답변완료]</td>
                            <td>
                                <a href="#" class="col-title">면도 후 인그로운 헤어랑 붉은 기 진정 어떻게 하시나요?</a>
                                <span class="reply-count">[14]</span>
                            </td>
                            <td class="col-writer">매일면도</td>
                            <td class="col-date">06-15</td>
                            <td class="col-hits">142</td>
                        </tr>
                        <tr>
                            <td class="col-num">100</td>
                            <td class="col-product" style="color: var(--text-muted); font-weight: 500;">[답변완료]</td>
                            <td>
                                <a href="#" class="col-title">코 주변 블랙헤드 제거용으로 클렌징 오일 유화법 효과 보신 분 계신가요?</a>
                                <span class="reply-count">[26]</span>
                            </td>
                            <td class="col-writer">그루밍초보</td>
                            <td class="col-date">06-14</td>
                            <td class="col-hits">780</td>
                        </tr>
                        <tr>
                            <td class="col-num">99</td>
                            <td class="col-product" style="color: var(--text-muted); font-weight: 500;">[답변완료]</td>
                            <td>
                                <a href="#" class="col-title">지성 피부인데 여름철에 수분크림 생략해도 문제 없을까요?</a>
                                <span class="reply-count">[9]</span>
                            </td>
                            <td class="col-writer">산유국인간</td>
                            <td class="col-date">06-13</td>
                            <td class="col-hits">215</td>
                        </tr>
                        -->
                    </tbody>
                </table>

                <div class="board-footer">
                    <ul class="pagination" id="pagination-container">
                        <li>
                            <a th:if="${pageVO.prev}" th:href="@{qna(page=${pageVO.startPage-1})}">←</a>
                        </li>
                        <th:block
                            th:each="num : ${#numbers.sequence(pageVO.startPage, pageVO.endPage)}">
                            <li>
                                <a th:href="@{/board/qna(page=${num})}"
                                th:text="${num}"
                                th:classappend="${pageVO.page == num} ? 'active'"></a>
                            </li>
                        </th:block>
                        <li>
                            <a th:if="${pageVO.next}" th:href="@{qna(page=${pageVO.endPage+1})}">→</a>
                        </li>
                    </ul>
                    <form th:action="@{/board/qna/search}" method="POST">
                        <div class="search-group">
                            <select name="searchType">
                                <option value="titleContent">제목+내용</option>
                                <option value="title">제목</option>
                                <option value="writer">작성자</option>
                            </select>
                            <input type="text" name="searchStr" placeholder="궁금한 단어를 입력하세요.">
                            <button type="submit" class="search-btn">검색</button>
                        </div>
                    </form>
                </div>
            </section>

        </div>

    </main>

    <div th:replace="~{layout/footer :: footerFragment}"></div>

</body>
<script th:src="@{/js/qna/qna_filter.js}"></script>
</html>
