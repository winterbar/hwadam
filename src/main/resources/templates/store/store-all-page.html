<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>화담 : 전체 상품</title>

  <link rel="icon" type="image/png" th:href="@{/images/common/icon.png}">
  <link rel="stylesheet" th:href="@{/css/common/header.css}">
  <link rel="stylesheet" th:href="@{/css/common/footer.css}">

  <link rel="stylesheet" th:href="@{/css/store/store-all-page.css}">
</head>

<body>

<header th:replace="~{layout/header :: header}"></header>

<main class="store-all-main">
  <div class="store-all-container">

    <nav class="store-breadcrumb" aria-label="현재 위치">
      <a th:href="@{/}">홈</a>
      <span>›</span>
      <a th:href="@{/store}">스토어</a>
      <span>›</span>
      <strong>전체 상품</strong>
    </nav>

  
    <section class="store-search-section">
      <form class="store-search-form"
            th:action="@{/store/all}"
            method="get">

        <input type="text"
               name="query"
               class="store-search-input"
               th:value="${query}"
               placeholder="상품명 또는 브랜드를 검색해보세요."
               aria-label="상품 검색">

        <input type="hidden"
               name="category1"
               th:value="${category1}">

        <button type="submit"
                class="store-search-button">
          검색
        </button>

      </form>
    </section>

    <div class="store-content-layout">

      <!-- 왼쪽 카테고리 -->
      <aside class="store-category-sidebar">

        <h2 class="store-category-title">카테고리</h2>

        <div class="store-category-group">
          <h3>전체 분류</h3>

          <ul class="store-category-list">

            <li>
              <a th:href="@{/store/all}"
                 class="store-category-link"
                 th:classappend="${category1 == null or #strings.isEmpty(category1)} ? ' active' : ''">
                <span>전체</span>
              </a>
            </li>

            <li>
              <a th:href="@{/store/all(category1='스킨케어')}"
                 class="store-category-link"
                 th:classappend="${category1 == '스킨케어'} ? ' active' : ''">
                <span>스킨케어</span>
              </a>
            </li>

            <li>
              <a th:href="@{/store/all(category1='메이크업')}"
                 class="store-category-link"
                 th:classappend="${category1 == '메이크업'} ? ' active' : ''">
                <span>메이크업</span>
              </a>
            </li>

            <li>
              <a th:href="@{/store/all(category1='클렌징')}"
                 class="store-category-link"
                 th:classappend="${category1 == '클렌징'} ? ' active' : ''">
                <span>클렌징</span>
              </a>
            </li>

            <li>
              <a th:href="@{/store/all(category1='선케어')}"
                 class="store-category-link"
                 th:classappend="${category1 == '선케어'} ? ' active' : ''">
                <span>선케어</span>
              </a>
            </li>

            <li>
              <a th:href="@{/store/all(category1='헤어/바디')}"
                 class="store-category-link"
                 th:classappend="${category1 == '헤어/바디'} ? ' active' : ''">
                <span>헤어/바디</span>
              </a>
            </li>

            <li>
              <a th:href="@{/store/all(category1='향수')}"
                 class="store-category-link"
                 th:classappend="${category1 == '향수'} ? ' active' : ''">
                <span>향수</span>
              </a>
            </li>

          </ul>
        </div>

        <div class="store-category-group">
          <h3>추천 세부 카테고리</h3>

          <ul class="store-category-list">

            <li>
              <a th:href="@{/store/all(category2='토너/패드')}"
                 class="store-category-link"
                 th:classappend="${category2 == '토너/패드'} ? ' active' : ''">
                <span>토너/패드</span>
              </a>
            </li>

            <li>
              <a th:href="@{/store/all(category2='세럼/앰플')}"
                 class="store-category-link"
                 th:classappend="${category2 == '세럼/앰플'} ? ' active' : ''">
                <span>세럼/앰플</span>
              </a>
            </li>

            <li>
              <a th:href="@{/store/all(category2='크림')}"
                 class="store-category-link"
                 th:classappend="${category2 == '크림'} ? ' active' : ''">
                <span>크림</span>
              </a>
            </li>

            <li>
              <a th:href="@{/store/all(category2='선크림')}"
                 class="store-category-link"
                 th:classappend="${category2 == '선크림'} ? ' active' : ''">
                <span>선크림</span>
              </a>
            </li>

            <li>
              <a th:href="@{/store/all(category2='쿠션/파운데이션')}"
                 class="store-category-link"
                 th:classappend="${category2 == '쿠션/파운데이션'} ? ' active' : ''">
                <span>쿠션/파운데이션</span>
              </a>
            </li>

            <li>
              <a th:href="@{/store/all(category2='립틴트')}"
                 class="store-category-link"
                 th:classappend="${category2 == '립틴트'} ? ' active' : ''">
                <span>립틴트</span>
              </a>
            </li>

          </ul>
        </div>

        <button type="button"
                class="store-category-reset"
                onclick="location.href='/store/all'">
          카테고리 초기화
        </button>

      </aside>

      <!-- 오른쪽 상품 영역 -->
      <section class="store-product-area">

        <div class="store-filter-summary">

          <span class="store-filter-label">선택 조건</span>

          <span class="store-filter-chip"
                th:if="${category1 != null and !#strings.isEmpty(category1)}">
            <span th:text="${category1}">스킨케어</span>
            <button type="button"
                    aria-label="대분류 필터 삭제"
                    onclick="location.href='/store/all'">
              ×
            </button>
          </span>

          <span class="store-filter-chip"
                th:if="${category2 != null and !#strings.isEmpty(category2)}">
            <span th:text="${category2}">세럼/앰플</span>
            <button type="button"
                    aria-label="세부 카테고리 필터 삭제"
                    onclick="location.href='/store/all'">
              ×
            </button>
          </span>

          <span class="store-filter-chip"
                th:if="${query != null and !#strings.isEmpty(query)}">
            검색어&nbsp;
            <span th:text="${query}">수분크림</span>
            <button type="button"
                    aria-label="검색어 삭제"
                    onclick="location.href='/store/all'">
              ×
            </button>
          </span>

          <button type="button"
                  class="store-filter-reset"
                  onclick="location.href='/store/all'">
            전체 초기화
          </button>

        </div>

        <div class="store-result-toolbar">

          <div class="store-result-title">
            <h2>상품 목록</h2>

            <span>
              총
              <strong th:text="${totalCount != null ? totalCount : 0}">0</strong>
              개
            </span>
          </div>

          <form th:action="@{/store/all}"
                method="get">

            <input type="hidden"
                   name="query"
                   th:value="${query}">

            <input type="hidden"
                   name="category1"
                   th:value="${category1}">

            <input type="hidden"
                   name="category2"
                   th:value="${category2}">

            <select name="sort"
                    class="store-sort-select"
                    aria-label="상품 정렬"
                    onchange="this.form.submit()">

              <option value="sim"
                      th:selected="${sort == null or sort == 'sim'}">
                추천순
              </option>

              <option value="asc"
                      th:selected="${sort == 'asc'}">
                낮은 가격순
              </option>

              <option value="dsc"
                      th:selected="${sort == 'dsc'}">
                높은 가격순
              </option>

            </select>

          </form>

        </div>

        <div class="store-empty"
             th:if="${storeList == null or #lists.isEmpty(storeList)}">

          <strong>조건에 맞는 상품이 없어요.</strong>
          <p>다른 검색어나 카테고리로 다시 찾아보세요.</p>

        </div>

        <div class="store-product-grid"
             th:if="${storeList != null and !#lists.isEmpty(storeList)}">

          <article class="store-product-card"
                   th:each="product : ${storeList}"
                   th:data-product-id="${product.productId}">

            <div class="store-product-image">

              <button type="button"
                      class="store-like-button"
                      th:data-product-id="${product.productId}"
                      aria-label="상품 찜하기">
                ♡
              </button>

              <img th:if="${product.image != null and !#strings.isEmpty(product.image)}"
                   th:src="${product.image}"
                   th:alt="${product.title}">

              <img th:unless="${product.image != null and !#strings.isEmpty(product.image)}"
                   th:src="@{/images/store/no-image.png}"
                   alt="상품 이미지 없음">

            </div>

            <div class="store-product-body">

              <div class="store-product-brand"
                   th:text="${product.brand != null and !#strings.isEmpty(product.brand)
                              ? product.brand
                              : '브랜드 정보 없음'}">
                브랜드
              </div>

              <p class="store-product-name"
                 th:text="${product.title != null
                            ? product.title
                            : '상품명 정보 없음'}">
                상품명
              </p>

              <div class="store-product-category">

                <span th:if="${product.category1 != null and !#strings.isEmpty(product.category1)}"
                      th:text="${product.category1}">
                  대분류
                </span>

                <span th:if="${product.category2 != null and !#strings.isEmpty(product.category2)}"
                      th:text="${' · ' + product.category2}">
                  · 중분류
                </span>

              </div>

              <div class="store-product-price">
                <span th:text="${#numbers.formatInteger(product.lprice, 1, 'COMMA')}">
                  0
                </span>
                <small>원</small>
              </div>

              <div class="store-product-actions">

                <button type="button"
                        class="store-cart-button"
                        th:data-product-id="${product.productId}">
                  장바구니
                </button>

                <button type="button"
                        class="store-buy-button"
                        th:data-product-id="${product.productId}">
                  구매하기
                </button>

              </div>

            </div>

          </article>

        </div>

        <nav class="store-pagination"
             th:if="${totalPages != null and totalPages > 1}"
             aria-label="상품 페이지">

          <a class="store-page-button"
             th:if="${currentPage != null and currentPage > 1}"
             th:href="@{/store/all(
                        page=${currentPage - 1},
                        query=${query},
                        category1=${category1},
                        category2=${category2},
                        sort=${sort}
                      )}">
            ‹
          </a>

          <a class="store-page-button"
             th:each="pageNo : ${#numbers.sequence(1, totalPages)}"
             th:href="@{/store/all(
                        page=${pageNo},
                        query=${query},
                        category1=${category1},
                        category2=${category2},
                        sort=${sort}
                      )}"
             th:text="${pageNo}"
             th:classappend="${pageNo == currentPage} ? ' active' : ''">
            1
          </a>

          <a class="store-page-button"
             th:if="${currentPage != null and currentPage < totalPages}"
             th:href="@{/store/all(
                        page=${currentPage + 1},
                        query=${query},
                        category1=${category1},
                        category2=${category2},
                        sort=${sort}
                      )}">
            ›
          </a>

        </nav>

      </section>

    </div>

  </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>

</body>
</html>
