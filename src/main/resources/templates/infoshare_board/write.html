<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauminity : 정보 작성하기</title>
    <link rel="icon" type="image/png" th:href="@{/images/common/icon.png}">
    <link rel="stylesheet" th:href="@{/css/common/main.css}">
    <link rel="stylesheet" th:href="@{/css/common/board.css}">
    <link rel="stylesheet" th:href="@{/css/infoshare_board/write.css}">
</head>
<body>

    <div th:replace="~{layout/header :: headerFragment}"></div>

    <main class="write-page-container">
        <form th:action="@{/board/infoshare/write}" method="post" enctype="multipart/form-data" class="write-box">
            <div class="write-header">
                <h2>정보 작성하기</h2>
            </div>
            
            <div class="inline-group">
                <div class="form-group">
                    <label for="category">카테고리</label>
                    <select id="category" name="category" class="form-control">
                        <option value="tip">팁/노하우</option>
                        <option value="menual">사용법</option>
                        <option value="analysis">성분 분석</option>
                        <option value="recommand">제품 추천</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="target">대상</label>
                    <select id="target" name="target" class="form-control">
                        <option value="beginner">초보</option>
                        <option value="intermediate">중수</option>
                        <option value="advanced">고수</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="title">제목</label>
                <input type="text" id="title" name="title" class="form-control" placeholder="제목을 작성해주세요.">
            </div>

            <div class="form-group">
                <label for="content">내용</label>
                <textarea id="content" name="content" class="form-control" placeholder="공유하고 싶은 정보를 입력하세요.<br>허위 사실 작성 시 게시글이 삭제될 수 있습니다."></textarea>
            </div>

            <div class="form-group">
                <label>사진/파일 첨부</label>
                <div id="drop-zone">📁 클릭하거나 파일을 여기로 드래그하여 업로드 (JPG, PNG, GIF 파일 가능, 최대 10MB)</div>
                <input type="file" id="fileInput" name="files" multiple style="display: none;">
                <div id="preview-container"></div>
            </div>

            <div class="button-group">
                <button type="button" class="btn-cancel" onclick="history.back()">취소하기</button>
                <button type="submit" class="btn-submit">게시하기</button>
            </div>
        </form>
    </main>

    <div th:replace="~{layout/footer :: footerFragment}"></div>

    <script th:src="@{/js/infoshare/write.js}"></script>
</body>
</html>
