<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauminity : 후기 게시글 수정 페이지</title>
    <link rel="stylesheet" th:href="@{/css/common/main.css}">
    <link rel="stylesheet" th:href="@{/css/review_board/review_common.css}">
    <link rel="stylesheet" th:href="@{/css/review_board/review_detail.css}">
    <link rel="stylesheet" th:href="@{/css/review_board/review_edit.css}">

</head>

<div th:replace="~{layout/header :: header}"></div>

<body>

    <main>
        <form th:action="@{/board/review/edit/{id}(id=${reviewForm.boardId})}" 
            th:object="${reviewForm}" 
            method="post"
            enctype="multipart/form-data" 
            class="detail-container">
            
            <input type="hidden" th:field="*{boardId}" />

            <div class="category-path">
                카테고리: <span th:text="*{category1}">대분류</span> &gt; <span th:text="*{category2}">소분류</span>
            </div>

            <div class="detail-header">
                <div class="detail-title-row" style="margin-bottom: 1rem; border-bottom: 1px solid var(--border-color);">
                    <input type="text" th:field="*{title}" class="borderless-input" style="font-weight: bold; font-size: 1.6rem;" placeholder="제목을 입력하세요." required />
                </div>
                <div class="detail-meta-row">
                    <div>
                        작성자: <strong th:text="*{nickName}">작성자 닉네임</strong>
                        <span style="margin: 0 0.5rem; color: var(--border-color);">|</span>
                        등록일: <span th:text="${#temporals.format(reviewForm.createdAt, 'yyyy-MM-dd HH:mm')}">2026-06-19</span>
                    </div>
                </div>
            </div>

            <div class="product-info-card">
                <div>
                    <span style="font-size: 0.8rem; color: var(--text-muted); font-weight: 700; display: block; margin-bottom: 0.3rem;">리뷰 대상</span>
                    <span class="product-name" th:text="*{productName}">제품명 정보</span>
                </div>
                <div class="product-image-wrapper">
                    <img th:if="*{productImage}" th:src="*{productImage}" alt="제품 사진">
                    <span th:unless="*{productImage}" style="font-size: 0.8rem; color: var(--text-muted);">사진 없음</span>
                </div>
            </div>


            <div style="margin-bottom: 2rem;">
                <label style="font-size: 0.85rem; color: var(--text-muted); font-weight: 700; display: block; margin-bottom: 0.5rem;">리뷰 내용 수정</label>
                <textarea th:field="*{content}" class="borderless-input edit-textarea-custom" placeholder="솔직한 실사용 후기를 작성해 주세요." required></textarea>
            </div>

            <div class="attached-images-grid" style="margin-bottom: 2.5rem;">
                <div class="image-item-box drop-zone" 
                    th:each="file, status : ${fileList}"
                    style="margin-bottom: 1.5rem;
                    border: 1px solid var(--border-color);
                    padding: 1rem; border-radius: 6px; position: relative;">
                    <span style="font-size: 0.8rem; color: var(--text-muted); display: block; margin-bottom: 0.5rem; font-weight: bold;">
                        기존 업로드 이미지 <span th:text="${status.count}">1</span>
                    </span>
                    
                    <div class="current-image-preview" style="width: 150px; height: 150px; border: 1px solid #eee; overflow: hidden; margin-bottom: 0.5rem; background-color: #f9f9f9; display: flex; align-items: center; justify-content: center;">
                        <img th:src="@{/upload/review/{name}(name=${file.savedName})}" alt="기존 이미지" style="width: 100%; height: 100%; object-fit: contain;">
                    </div>

                    <input type="hidden" name="existingFileIds" th:value="${file.fileId}" />

                    <input type="file" name="reviewFiles" class="file-input" accept="image/*" style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem;" />
                    
                    <div class="drop-zone-text" style="color: #888; font-size: 0.75rem; margin-top: 0.3rem;">
                        ※ 이 이미지를 변경하려면 새 파일을 선택하거나 **여기에 이미지를 드래그하세요.**
                    </div>
                </div>
            </div>

            <div class="detail-actions-row">
                <div>
                    <a th:href="@{/board/review/detail/{id}(id=${reviewForm.boardId})}" class="btn" style="background-color: #f5f5f5; border: 1px solid var(--border-color); color: var(--text-main); text-decoration: none; padding: 0.8rem 1.5rem; display: inline-block;">
                        ❌ 수정 취소
                    </a>
                </div>
                
                <div style="background: #f8d7da; padding: 0.5rem; font-size: 0.8rem; color: #721c24;">
                    현재 로그인 계정 ID: <strong th:text="${#authentication.name}">로그인ID</strong> <br>
                    게시글 작성자 ID: <strong th:text="*{userName}">작성자ID</strong>
                </div>

                <div style="display: flex; gap: 0.5rem;">
                    <button type="submit" class="btn btn-cancel" style="background-color: var(--color-accent); color: white; padding: 0.8rem 1.5rem; font-weight: bold; cursor: pointer;">
                        💾 수정 완료
                    </button>
                </div>
            </div>

        </form>
    </main>

</body>

<div th:replace="~{layout/footer :: footer}"></div>

</html>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // 페이지 내 모든 drop-zone 요소를 수집
        const dropZones =document.querySelectorAll('.image-item-box.drop-zone');

        dropZones.forEach(zone => {
            const fileInput = zone.querySelector('.file-input');

            // 1. 브라우저 기본 이벤트(파일 열기) 방지 루틴 통합
            ['dragenter','dragover','dragleave','drop'].forEach(eventName => {
                zone.addEventListener(eventName, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                }, false);
            });

            // 2. 드래그 오버 시 시각적 효과 부여
            ['dragenter','dragover'].forEach(eventName => {
                zone.addEventListener(eventName, () => {
                    zone.classList.add('drag-over');
                }, false);
            });

            // 3. 드래그 이탈/종류 시 시각적 효과 제거
            ['dragleave','drop'].forEach(eventName => {
                zone.addEventListener(eventName, () => {
                    zone.classList.remove('drag-over');
                }, false);
            });

            // 4. 드롭 이벤트 발생 시 파일 데이터 가공 및 인풋 이식
            zone.addEventListener('drop', (e) => {
                const dt = e.dataTransfer;
                const files = dt.files;

               if (files && files.length > 0) {
                    // 이미지 파일 확장자만 허용 검증
                    if (files[0].type.startsWith('image/')) {
                        
                        // 1) input 태그의 files 속성에 드롭된 파일 객체 고정 이식
                        fileInput.files = files;

                        // 💡 [수정 2] 브라우저 메모리에 가상 이미지 URL 생성하기
                        const newImgUrl = URL.createObjectURL(files[0]);

                        // 💡 [수정 3] 현재 박스 내에 있는 <img> 태그를 찾아 src 주소를 새로 만든 가상 주소로 변경
                        const previewImg = zone.querySelector('.current-image-preview img');
                        if (previewImg) {
                            previewImg.src = newImgUrl;
                        }

                        // 2) 텍스트 안내 문구 업데이트
                        const textNode = zone.querySelector('.drop-zone-text');
                        textNode.innerHTML = `<span style="color: #007bff; font-weight: bold;">교체 예정: ${files[0].name}</span>`;
                        
                    } else {
                        alert("이미지 파일만 업로드 가능합니다.");
                    }
                }
            });
        });
    });
</script>
