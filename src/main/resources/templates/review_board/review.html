<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauminity : 후기 게시판</title>
    <link rel="icon" type="image/png" th:href="@{/images/common/icon.png}">
    <link rel="stylesheet" th:href="@{/css/review_board/review_common.css}">
    <link rel="stylesheet" th:href="@{/css/common/main.css}">
    <link rel="stylesheet" th:href="@{/css/common/header.css}">
    <link rel="stylesheet" th:href="@{/css/common/footer.css}">
    
    
</head>
<body>

    <div th:replace="~{layout/header :: headerFragment}"></div>

    <main class="rv-main-layout">
        <div class="rv-container">
                    
            <section class="rv-section-header">
                <h2>
                    리뷰 <span class="rv-sub-title">협찬 무관, 유저들의 리얼한 후기</span>
                </h2>
                <button class="rv-write-btn" th:onclick="|location.href='@{/board/review/write}'|">
                    글쓰기
                </button>
            </section>

            <div class="rv-category-filter-section">
        
                <div class="rv-dropdown-container">
                    <button type="button" class="rv-dropdown-btn">
                        <span th:text="${param.category1 != null && !#strings.isEmpty(param.category1)} ? ${param.category1} : '카테고리'">카테고리</span>
                        <span class="arrow-icon">▾</span>
                    </button>
                    
                    <ul class="rv-dropdown-menu">
                        <li><a th:href="@{/board/review/list}" th:classappend="${param.category1 == null || #strings.isEmpty(param.category1)} ? 'active'">전체보기</a></li>
                        <li><a th:href="@{/board/review/list(category1='스킨케어')}" data-cat1="스킨케어" th:classappend="${param.category1 != null && #strings.toString(param.category1) == '스킨케어'} ? 'active'">스킨케어</a></li>
                        <li><a th:href="@{/board/review/list(category1='선케어')}" data-cat1="선케어" th:classappend="${param.category1 != null && #strings.toString(param.category1) == '선케어'} ? 'active'">선케어</a></li>
                        <li><a th:href="@{/board/review/list(category1='마스크/팩')}" data-cat1="마스크/팩" th:classappend="${param.category1 != null && #strings.toString(param.category1) == '마스크/팩'} ? 'active'">마스크/팩</a></li>
                        <li><a th:href="@{/board/review/list(category1='클렌징')}" data-cat1="클렌징" th:classappend="${param.category1 != null && #strings.toString(param.category1) == '클렌징'} ? 'active'">클렌징</a></li>
                        <li><a th:href="@{/board/review/list(category1='메이크업')}" data-cat1="메이크업" th:classappend="${param.category1 != null && #strings.toString(param.category1) == '메이크업'} ? 'active'">메이크업</a></li>
                        <li><a th:href="@{/board/review/list(category1='헤어케어')}" data-cat1="헤어케어" th:classappend="${param.category1 != null && #strings.toString(param.category1) == '헤어케어'} ? 'active'">헤어케어</a></li>
                        <li><a th:href="@{/board/review/list(category1='바디케어')}" data-cat1="바디케어" th:classappend="${param.category1 != null && #strings.toString(param.category1) == '바디케어'} ? 'active'">바디케어</a></li>
                        <li><a th:href="@{/board/review/list(category1='핸드케어')}" data-cat1="핸드케어" th:classappend="${param.category1 != null && #strings.toString(param.category1) == '핸드케어'} ? 'active'">핸드케어</a></li>
                        <li><a th:href="@{/board/review/list(category1='네일케어')}" data-cat1="네일케어" th:classappend="${param.category1 != null && #strings.toString(param.category1) == '네일케어'} ? 'active'">네일케어</a></li>
                        <li><a th:href="@{/board/review/list(category1='뷰티소품')}" data-cat1="뷰티소품" th:classappend="${param.category1 != null && #strings.toString(param.category1) == '뷰티소품'} ? 'active'">뷰티소품</a></li>
                    </ul>
                </div>

                <div class="chips-container active" data-group="스킨케어">
                    <button type="button" class="chip-item" data-cat1="스킨케어" data-cat2="전체"
                            th:classappend="${param.category2 == null || #strings.isEmpty(param.category2) || #strings.toString(param.category2) == '전체'} ? 'active'">전체 보기</button>
                    
                    <button type="button" class="chip-item" data-cat1="스킨케어" data-cat2="스킨/토너">스킨/토너</button>
                    <button type="button" class="chip-item" data-cat1="스킨케어" data-cat2="로션">로션</button>
                    <button type="button" class="chip-item" data-cat1="스킨케어" data-cat2="에센스">에센스</button>
                    <button type="button" class="chip-item" data-cat1="스킨케어" data-cat2="크림">크림</button>
                </div>

            </div>

            <div class="rv-board-utility">
                <div class="rv-filter-group">
                    <select name="sort" id="filter-sort">
                        <option value="latest" th:selected="${param.sortType == 'latest'}">최신순</option>
                        <option value="hits" th:selected="${param.sortType == 'hits'}">조회순</option>
                    </select>
                </div>
            </div>

            <div class="rv-card-grid">
                <th:block th:if="${reviewList != null and !reviewList.isEmpty()}">
                    <div class="rv-card" th:each="review : ${reviewList}" th:onclick="|location.href='@{/board/review/detail(id=${review.boardId})}'|">
                        
                        <div class="card-category-tag">
                            <span class="main-cat" th:text="${review.category1}">대분류</span> 
                            <span class="divider">/</span> 
                            <span class="sub-cat" th:text="${review.category2}">소분류</span>
                        </div>

                        <div class="card-profile">
                            <img th:if="${review.memberProfilePath != null and !#strings.isEmpty(review.memberProfilePath)}" 
                                th:src="${review.memberProfilePath}" 
                                alt="프로필 이미지" class="profile-img"/>
                            <div th:unless="${review.memberProfilePath != null and !#strings.isEmpty(review.memberProfilePath)}" 
                                class="profile-default"></div>
                            <span class="nickname" th:text="${review.nickName}">작성자 닉네임</span>
                        </div>

                        <div class="card-image-wrapper">
                            <img th:if="${review.savedName != null and !#strings.isEmpty(review.savedName)}" 
                                th:src="@{|/upload/${review.savedName}|}" 
                                alt="리뷰 제품 이미지"/>
                            <div th:unless="${review.savedName != null and !#strings.isEmpty(review.savedName)}" 
                                class="no-image">
                                등록된 이미지가 없습니다.
                            </div>
                        </div>

                        <div class="card-body">
                            <div class="text-area">
                                <h3 class="product-name" th:text="${review.productName}">리뷰 제품 명</h3>
                                <p class="review-content" th:text="${review.content}">
                                    리뷰 본문 내용이 출력됩니다.
                                </p>
                            </div>

                            <div class="card-footer">
                                <div class="rating-star">★ ★ ★ ★ ★</div>
                                <div class="meta-info">
                                    <span>조회수 <span th:text="${review.viewCnt}">0</span></span>
                                    <span class="meta-divider">·</span>
                                    <span th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd')}">게시 일자</span>
                                </div>
                            </div>
                        </div>
                        
                    </div> 
                </th:block>

                <div th:if="${reviewList == null || reviewList.isEmpty()}" class="rv-empty-message">
                    <p>선택하신 카테고리에 등록된 리뷰 게시글이 존재하지 않습니다.</p>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{layout/footer :: footerFragment}"></div>

</body>
</html>

<script th:inline="javascript">
document.addEventListener("DOMContentLoaded", function() {
    
    // 드롭다운 관련 요소들
    const dropdownContainer = document.querySelector(".rv-dropdown-container");
    const dropdownBtn = document.querySelector(".rv-dropdown-btn");
    const dropdownItems = document.querySelectorAll(".rv-dropdown-menu a");
    
    // 소분류 칩스 및 정렬 요소
    const chipsContainers = document.querySelectorAll(".chips-container");
    const sortSelect = document.getElementById("filter-sort");

    /* ==========================================================================
       [추가] 1. 드롭다운 열고 닫기 제어
       ========================================================================== */
    document.addEventListener("DOMContentLoaded", function() {
        const dropdownContainer = document.querySelector(".rv-dropdown-container");
        const dropdownBtn = document.querySelector(".rv-dropdown-btn");

        if (dropdownBtn && dropdownContainer) {
            // 1. 버튼 클릭 시 드롭다운 토글 (열기/닫기)
            dropdownBtn.addEventListener("click", function(e) {
                e.stopPropagation(); // 바깥 클릭 이벤트와 충돌 방지
                dropdownContainer.classList.toggle("show");
            });
        }

        // 2. 드롭다운 메뉴 바깥 영역 아무 데나 누르면 자동으로 닫히기
        document.addEventListener("click", function(e) {
            if (dropdownContainer && !dropdownContainer.contains(e.target)) {
                dropdownContainer.classList.remove("show");
            }
        });
    });

    /* ==========================================================================
       [개편] 2. 대분류 선택 처리 (기존 .tab-btn 로직을 드롭다운 링크로 이식)
       ========================================================================== */
    dropdownItems.forEach(item => {
        item.addEventListener("click", function(e) {
            // <a> 태그의 기본 상단 이동 및 즉시 페이지 이동 동작을 방지 (소분류 칩 토글을 먼저 해야하므로)
            e.preventDefault(); 
            
            const selectedCat1 = this.getAttribute("data-cat1");

            // [예외] 클릭한 대분류가 '전체보기'라면 칩 토글 없이 바로 서버로 이동!
            if (selectedCat1 === "전체보기") {
                const currentSort = sortSelect.value;
                location.href = `/board/review?page=1&category1=${encodeURIComponent(selectedCat1)}&category2=전체&sortType=${currentSort}`;
                return; 
            }

            // 드롭다운 버튼 텍스트를 현재 선택한 대분류 이름으로 변경 + 화살표 유지
            dropdownBtn.innerHTML = `${selectedCat1} <span class="arrow-icon">▾</span>`;

            // 모든 드롭다운 아이템 스타일 초기화 후 선택된 아이템 활성화
            dropdownItems.forEach(link => link.classList.remove("active"));
            this.classList.add("active");

            // 모든 칩스 컨테이너 숨긴 후, 매칭되는 대분류 컨테이너 칩스 구역만 아래에 노출
            chipsContainers.forEach(container => {
                if (container.getAttribute("data-group") === selectedCat1) {
                    container.classList.add("active");
                } else {
                    container.classList.remove("active");
                }
            });

            // 선택이 끝났으므로 드롭다운 메뉴 닫기
            dropdownContainer.classList.remove("show");
        });
    });

    /* ==========================================================================
       3. 소분류 칩(Chip) 클릭 시 최종 파라미터 전송 및 페이지 이동 (기존 유지)
       ========================================================================== */
    const chipItems = document.querySelectorAll(".chip-item");
    chipItems.forEach(chip => {
        chip.addEventListener("click", function() {
            const cat1 = this.getAttribute("data-cat1");
            const cat2 = this.getAttribute("data-cat2");
            const currentSort = sortSelect.value;
            
            location.href = `/board/review?page=1&category1=${encodeURIComponent(cat1)}&category2=${encodeURIComponent(cat2)}&sortType=${currentSort}`;
        });
    });

    /* ==========================================================================
       4. 최신순/조회순 정렬 변경 이벤트 처리 (기존 유지)
       ========================================================================== */
    if (sortSelect) {
        sortSelect.addEventListener("change", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const cat1 = urlParams.get("category1") || "전체보기";
            const cat2 = urlParams.get("category2") || "전체";
            
            location.href = `/board/review?page=1&category1=${encodeURIComponent(cat1)}&category2=${encodeURIComponent(cat2)}&sortType=${this.value}`;
        });
    }
});
</script>
