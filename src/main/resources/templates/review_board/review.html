<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauminity : 후기 게시판</title>
    <link rel="icon" type="image/png" th:href="@{/images/common/icon.png}">
    <link rel="stylesheet" th:href="@{/css/common/main.css}">
    <link rel="stylesheet" th:href="@{/css/review_board/review_common.css}">
    
    
    
</head>
<body>

    <div th:replace="~{layout/header :: header}"></div>

    <main style="max-width: 1600px !important; display: block; width: 100%;">
        <div class="main-container" style="display: flex; justify-content: space-between; align-items: flex-start; gap: 2.5rem; max-width: 2000px; margin: 0 auto; padding: 0 20px;">

            <div class="main-left-content" style="flex: 1; min-width: 0;">
                
                <section class="board-section">
                    <div class="section-header">
                        <h2>리뷰 <span>협찬 무관, 유저들의 리얼한 실사용 데이터입니다.</span></h2>
                        <button class="write-btn" th:onclick="|location.href='@{/board/review/write}'|">리뷰 작성</button>
                    </div>
                    
                    <div class="board-utility">
                        <div class="filter-group" style="display: flex; gap: 1rem; align-items: center;">
    
                            <div class="category-dropdown-wrapper">
                                <button type="button" class="category-main-btn" id="current-category-label" 
                                        th:text="${param.category2 != null} ? ${param.category1} + ' > ' + ${param.category2} : '카테고리 선택'">
                                    카테고리 선택
                                </button>
                                <ul class="main-category-list">
                                    <li class="main-category-item" data-cat1="스킨케어">
                                        <span class="cat1-name">스킨케어</span>
                                        <ul class="sub-category-list">
                                            <li data-cat1="스킨케어" data-cat2="전체">전체 보기</li>
                                            <li data-cat1="스킨케어" data-cat2="스킨/토너">스킨/토너</li>
                                            <li data-cat1="스킨케어" data-cat2="로션">로션</li>
                                            <li data-cat1="스킨케어" data-cat2="에센스">에센스</li>
                                            <li data-cat1="스킨케어" data-cat2="크림">크림</li>
                                            <li data-cat1="스킨케어" data-cat2="토너패드">토너패드</li>
                                        </ul>
                                    </li>
                                    
                                    <li class="main-category-item" data-cat1="클렌징">
                                        <span class="cat1-name">클렌징</span>
                                        <ul class="sub-category-list">
                                            <li data-cat1="클렌징" data-cat2="전체">전체 보기</li>
                                            <li data-cat1="클렌징" data-cat2="클렌징폼">클렌징폼</li>
                                            <li data-cat1="클렌징" data-cat2="클렌징오일">클렌징오일</li>
                                        </ul>
                                    </li>
                                </ul>
                            </div>

                            <select name="sort" id="filter-sort">
                                <option value="latest" th:selected="${param.sortType == 'latest'}">최신순</option>
                                <option value="hits" th:selected="${param.sortType == 'hits'}">조회순</option>
                            </select>
                        </div>
                    </div>

                    <table class="board-table">
                        <thead>
                            <tr>
                                <th class="col-num">번호</th>
                                <th class="col-category">카테고리</th>
                                <th class="col-title">제목</th>
                                <th class="col-writer">작성자</th>
                                <th class="col-date">작성일</th>
                                <th class="col-hits">조회</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="board : ${reviewList}">
                                <td class="col-num" th:text="${board.boardId}"></td>
                                <td class="col-category" th:text="${board.category1} + '/' + ${board.category2}"></td>
                                <td>
                                    <a th:href="@{/board/review/detail/{id}(id=${board.boardId})}" 
                                    class="col-title" 
                                    style="display: inline-block; font-weight: bold; margin-bottom: 4px; vertical-align: middle;">
                                        
                                        <span th:text="${board.title}">올리브영 세일 때 쟁여야 할 지성 선크림 3종 솔직 비교</span>
                                        
                                        <span class="reply-count" th:text="'[' + ${board.replyCnt} + ']'" style="color: #ff4d4f; margin-left: 5px;">[0]</span>
                                        
                                    </a>
                                    
                                    <span class="selected-product-name" 
                                        th:text="'선택 제품: ' + ${board.productName}"
                                        style="font-size: 0.85em; color: #666; display: block; margin-bottom: 6px;">
                                    </span>
                                </td>
                                <td class="col-writer" th:text="${board.nickName}">올영단골</td>
                                <td class="col-date" th:text="${#temporals.format(board.createdAt, 'MM-dd')}">06-15</td>
                                <td class="col-hits" th:text="${board.viewCnt}">0</td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="board-footer">
                        <ul class="pagination" id="pagination-container">
                            <li>
                                <a th:if="${pageVO.prev}" th:href="@{review(page=${pageVO.startPage-1}, category1=${param.category1}, category2=${param.category2}, sortType=${param.sortType})}">←</a>
                            </li>
                            <th:block th:each="num : ${#numbers.sequence(pageVO.startPage, pageVO.endPage)}">
                                <li>
                                    <a th:href="@{review(page=${num}, category1=${param.category1}, category2=${param.category2}, sortType=${param.sortType})}"
                                    th:text="${num}"
                                    th:classappend="${pageVO.page == num} ? 'active'"></a>
                                </li>
                            </th:block>
                            <li>
                                <a th:if="${pageVO.next}" th:href="@{review(page=${pageVO.endPage+1}, category1=${param.category1}, category2=${param.category2}, sortType=${param.sortType})}">→</a>
                            </li>
                        </ul>
                        <form action="/search" method="POST">
                            <div class="search-group">
                                <select name="searchType">
                                    <option value="titleContent">제목+내용</option>
                                    <option value="title">제목</option>
                                    <option value="writer">작성자</option>
                                </select>
                                <input type="text" name="searchStr" placeholder="궁금한 단어를 입력하세요.">
                                <button type="submit" class="search-btn">검색</button>
                            </div>
                        </form>
                    </div>
                </section>

            </div> 
            <div style="width: 300px; flex-shrink: 0;">
                
            </div>

        </div> 
    </main>

    <div th:replace="~{layout/footer :: footerFragment}"></div>

</body>
</html>

<script th:inline="javascript">
document.addEventListener("DOMContentLoaded", function() {
    // 1. 소분류 메뉴 클릭 이벤트 리스너 처리
    const subCategories = document.querySelectorAll(".sub-category-list li");
    subCategories.forEach(li => {
        li.addEventListener("click", function() {
            const cat1 = this.getAttribute("data-cat1");
            const cat2 = this.getAttribute("data-cat2");
            const currentSort = document.getElementById("filter-sort").value;
            
            // 파라미터를 담아 백엔드 Controller의 매핑 주소로 동적 리다이렉트
            location.href = `/board/review?page=1&category1=${encodeURIComponent(cat1)}&category2=${encodeURIComponent(cat2)}&sortType=${currentSort}`;
        });
    });

    // 2. 최신순/조회순 정렬 변경 이벤트 리스너 처리
    const sortSelect = document.getElementById("filter-sort");
    sortSelect.addEventListener("change", function() {
        // 현재 주소창의 파라미터 상태를 파싱해서 카테고리 값 유지한 채 정렬만 교체
        const urlParams = new URLSearchParams(window.location.search);
        const cat1 = urlParams.get("category1") || "";
        const cat2 = urlParams.get("category2") || "";
        
        location.href = `/board/review?page=1&category1=${encodeURIComponent(cat1)}&category2=${encodeURIComponent(cat2)}&sortType=${this.value}`;
    });
});
</script>
