<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauminity : 후기 게시글 상세 페이지</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/review_common.css}">
    <link rel="stylesheet" th:href="@{/css/review_detail.css}">
</head>

<div th:replace="~{layout/header :: header}"></div>

<body>

    <main>
        <div class="detail-container">
            
            <div class="category-path">
                카테고리: <span th:text="${detail.category1}">대분류</span> &gt; <span th:text="${detail.category2}">소분류</span>
            </div>

            <div class="detail-header">
                <div class="detail-title-row">
                    <h2 class="detail-title" th:text="${detail.title}">작성 제목 위치</h2>
                </div>
                <div class="detail-meta-row">
                    <div>
                        작성자: <strong th:text="${detail.nickName}">작성자 닉네임</strong>
                        <span style="margin: 0 0.5rem; color: var(--border-color);">|</span>
                        등록일: <span th:text="${#temporals.format(detail.createdAt, 'yyyy-MM-dd HH:mm')}">2026-06-19</span>
                    </div>
                    <div class="stats-group">
                        <span>조회수 <strong th:text="${detail.viewCnt}">0</strong></span>
                        <span>댓글 수 <strong th:text="${detail.replyCnt}">0</strong></span>
                        <span>좋아요 수 <strong th:text="${detail.likeCnt}">0</strong></span>
                    </div>
                </div>
            </div>

            <div class="product-info-card">
                <div>
                    <span style="font-size: 0.8rem; color: var(--text-muted); font-weight: 700; display: block; margin-bottom: 0.3rem;">리뷰 대상</span>
                    <span class="product-name" th:text="${detail.productName}">제품명 정보</span>
                </div>
                <div class="product-image-wrapper">
                    <img th:if="${detail.productImage}" th:src="${detail.productImage}" alt="제품 사진">
                    <span th:unless="${detail.productImage}" style="font-size: 0.8rem; color: var(--text-muted);">사진 없음</span>
                </div>
            </div>

            <div class="detail-content-body" th:text="${detail.content}">
                후기 내용
            </div>

            <div class="attached-images-grid" th:if="${detail.attachedFiles != null and !detail.attachedFiles.isEmpty()}">
    
                <div class="image-item-box" th:each="file, iterStat : ${detail.attachedFiles}">
                    <span style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 0.5rem;" 
                        th:text="'업로드한 이미지' + ${iterStat.count}">
                        업로드한 이미지1
                    </span>
                    
                    <img th:src="@{/upload/review/{name}(name=${file.savedName})}" 
                        th:alt="${file.originalName}"
                        style="width: 100%; height: auto; object-fit: cover; border-radius: 4px; display: block;">
                </div>

            </div>

            <div class="detail-actions-row">
                <div>
                    <a th:href="${detail.productLink}" target="_blank" class="btn btn-link-out">
                        🔗 제품 쇼핑몰 바로가기
                    </a>
                </div>
                
                <div style="background: #f8d7da; padding: 0.5rem; font-size: 0.8rem; color: #721c24;">
                    현재 로그인 계정 ID: <strong th:text="${#authentication.name}">로그인ID</strong> <br>
                    게시글 작성자 ID: <strong th:text="${detail.userName}">작성자ID</strong>
                </div>

                <div style="display: fles; gap: 0.5rem;">
                    <a th:if="${#authentication.name == detail.userName}"
                        th:href="@{/board/review/edit/{id}(id=${detail.boardId})}"
                        class="btn btn-cancel" style="padding: 0.8rem 1.5rem;">
                        ✏️ 수정하기
                    </a>
                

                
                    <button type="button" class="btn btn-like">❤️ 좋아요</button>
                </div>
            </div>

            <div class="comment-section">
                <h5 style="font-weight: 800; font-size: 0.95rem; color: var(--text-main); margin-bottom: 1rem;">댓글</h5>
                <div class="comment-empty-box">
                    등록된 댓글이 없습니다. 첫 댓글을 남겨보세요!
                </div>
            </div>

        </div>
    </main>

</body>

<div th:replace="~{layout/footer :: footer}"></div>

</html>
