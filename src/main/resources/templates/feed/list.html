<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauminity : 피드</title>

    <link rel="stylesheet" href="/css/feed.css" th:href="@{/css/feed.css}">
    <link rel="stylesheet" href="/css/main.css" th:href="@{/css/main.css}">
</head>
<body>

<header th:replace="~{layout/header :: header}"></header>

<div class="feed-filter-bar is-closed" id="feed-filter-bar">
    <div class="feed-filter-summary" id="feed-filter-summary" role="button" tabindex="0">
        <div>
            <strong>해시태그로 피드 보기</strong>
            <span>궁금한 태그를 열어서 관련 피드만 모아보세요.</span>
        </div>
        <em id="feed-filter-toggle-icon">펼치기 ＋</em>
    </div>

    <div class="feed-filter-inner"
         id="feed-filter-inner"
         aria-label="해시태그 필터"
         style="display: none;">

        <button type="button"
                class="feed-tag-btn active"
                data-tag="all">
            #전체
        </button>

        <button type="button"
                class="feed-tag-btn"
                th:each="tagName : ${tagList}"
                th:data-tag="${tagName}"
                th:text="'#' + ${tagName}">
            #해시태그
        </button>

    </div>
</div>

<main>

    <div class="main-left-content">

        <section class="dashboard-section">
            <div class="section-header feed-section-header">
                <h2>
                    📸 BOTD
                    <span>사용자의 데일리 루틴과 사용샷을 모아보는 공간입니다.</span>
                </h2>

                <button class="feed-write-top-btn"
                        type="button"
                        onclick="location.href='/feed/write'">
                    피드 작성하기
                </button>
            </div>

            <div class="feed-list" id="feed-list-container">

                <article class="feed-card"
                         th:each="feed : ${feedList}"
                         th:data-content="${feed.feedContent}"
                         th:data-images="${feed.savedName}"
                         data-tags="BOTD">

                    <div class="feed-card-image">

                        <button type="button" class="feed-photo-arrow feed-photo-prev">‹</button>

                        <img alt="피드 이미지"
                             class="feed-image js-feed-image"
                             style="display: none;">

                        <div class="feed-image-placeholder js-feed-placeholder">
                            📸
                            <span>이미지 준비중</span>
                        </div>

                        <button type="button" class="feed-photo-arrow feed-photo-next">›</button>

                        <div class="feed-photo-badge js-photo-badge">
                            1 / 1
                        </div>

                    </div>

                    <div class="feed-card-content">

                        <div class="feed-card-top">
                            <div>
                                <strong>뷰미니티 회원</strong>
                                <span>피부타입 미등록 · 퍼스널컬러 미등록</span>
                            </div>

                            <div class="feed-more-wrap">
                                <button type="button" class="feed-more-btn">···</button>

                                <div class="feed-more-menu">
                                    <button type="button" class="feed-menu-item">수정하기</button>
                                    <button type="button" class="feed-menu-item danger">삭제하기</button>
                                </div>
                            </div>
                        </div>

                        <p class="feed-card-caption">
                            피드 내용
                        </p>

                        <a class="feed-info-link"
                           href="#"
                           target="_blank"
                           rel="noopener noreferrer"
                           style="display: none;">
                            정보공유 게시글 보러가기
                        </a>

                        <div class="feed-card-tags">
                            <button type="button"
                                    class="feed-hashtag-btn"
                                    th:each="tagName : ${tagList}"
                                    th:data-tag="${tagName}"
                                    th:text="'#' + ${tagName}"
                                    data-tag="BOTD">
                                    
                            </button>
                        </div>

                        <div class="feed-card-actions">
    <button type="button"
            class="feed-like-btn"
            data-liked="false"
            data-like-count="0">
        <span class="feed-like-icon">♡</span>
        <span class="feed-like-count">0</span>
    </button>

    <button type="button" class="feed-action-btn">💬</button>
</div>

                        <button type="button" class="feed-comment-count">
                            댓글 0개 모두 보기
                        </button>

                        <div class="feed-comment-list">
                            <div class="feed-comment-item">
                                <strong>뷰미니티 회원</strong>
                                <span>아직 등록된 댓글이 없습니다.</span>
                            </div>
                        </div>

                        <div class="feed-comment-box">
                            <input type="text" placeholder="댓글을 입력하세요">
                            <button type="button">등록</button>
                        </div>

                    </div>

                </article>

            </div>

            <div class="feed-empty"
                 id="feed-empty"
                 th:if="${feedList == null or #lists.isEmpty(feedList)}">
                등록된 피드가 없습니다. 첫 번째 피드를 작성해보세요!
            </div>
        </section>

    </div>

    <div class="right-sidebar">

        <div th:replace="~{layout/aside :: sidebarFragment}"></div>

        <div class="sidebar-ranking">
            <h4>🔥 인기 해시태그</h4>
            <ul class="ranking-list">
                <li class="ranking-item">
                    <span class="rank-user">
                        <span class="rank-num">1</span> #톤업크림
                    </span>
                    <span class="rank-points">142 posts</span>
                </li>
                <li class="ranking-item">
                    <span class="rank-user">
                        <span class="rank-num">2</span> #눈썹정리
                    </span>
                    <span class="rank-points">98 posts</span>
                </li>
                <li class="ranking-item">
                    <span class="rank-user">
                        <span class="rank-num">3</span> #나이트루틴
                    </span>
                    <span class="rank-points">73 posts</span>
                </li>
            </ul>
        </div>
    </div>

</main>

<footer th:replace="~{layout/footer :: footer}"></footer>

<script>
document.addEventListener('DOMContentLoaded', function () {

    const filterBar = document.getElementById('feed-filter-bar');
    const filterSummary = document.getElementById('feed-filter-summary');
    const filterToggleIcon = document.getElementById('feed-filter-toggle-icon');
    const filterInner = document.getElementById('feed-filter-inner');
    const feedEmpty = document.getElementById('feed-empty');

    function removeDuplicateTagButtons() {
        const tagButtons = document.querySelectorAll('.feed-tag-btn');
        const seenTags = new Set();

        tagButtons.forEach(function (button) {
            const tag = button.dataset.tag
                ? button.dataset.tag.replace('#', '').trim().toLowerCase()
                : '';

            if (!tag) return;

            if (seenTags.has(tag)) {
                button.remove();
            } else {
                seenTags.add(tag);
            }
        });
    }

    function renderFeedContentAndLink() {
        const feedCards = document.querySelectorAll('.feed-card');

        feedCards.forEach(function (card) {
            const rawContent = card.dataset.content
                ? card.dataset.content.trim()
                : '';

            const caption = card.querySelector('.feed-card-caption');
            const link = card.querySelector('.feed-info-link');

            if (!caption || !link) return;

            caption.style.display = 'none';
            link.style.display = 'none';

            if (!rawContent) return;

            let contentText = '';
            let linkText = '';

            function isLink(text) {
                if (!text) return false;

                const value = text.trim().toLowerCase();

                return value.startsWith('http://') || value.startsWith('https://');
            }

            if (rawContent.includes(',')) {
                const parts = rawContent.split(',');

                const first = parts[0] ? parts[0].trim() : '';
                const second = parts.length > 1 ? parts.slice(1).join(',').trim() : '';

                if (isLink(first)) {
                    linkText = first;
                } else {
                    contentText = first;
                }

                if (isLink(second)) {
                    linkText = second;
                }
            } else {
                if (isLink(rawContent)) {
                    linkText = rawContent;
                } else {
                    contentText = rawContent;
                }
            }

            if (contentText) {
                caption.textContent = contentText;
                caption.style.display = 'block';
            }

            if (linkText) {
                link.href = linkText;
                link.style.display = 'inline-flex';
            }
        });
    }

    function renderFeedImages() {
        const feedCards = document.querySelectorAll('.feed-card');

        feedCards.forEach(function (card) {
            const imageEl = card.querySelector('.js-feed-image');
            const placeholder = card.querySelector('.js-feed-placeholder');
            const badge = card.querySelector('.js-photo-badge');
            const prevBtn = card.querySelector('.feed-photo-prev');
            const nextBtn = card.querySelector('.feed-photo-next');

            const rawImages = card.dataset.images ? card.dataset.images.trim() : '';

            const images = rawImages
                .split(',')
                .map(function (name) {
                    return name.trim();
                })
                .filter(function (name) {
                    return name !== '' && name !== 'null';
                });

            let currentIndex = 0;

            function updateImage() {
                if (images.length === 0) {
                    if (imageEl) imageEl.style.display = 'none';
                    if (placeholder) placeholder.style.display = 'flex';
                    if (badge) badge.style.display = 'none';
                    if (prevBtn) prevBtn.style.display = 'none';
                    if (nextBtn) nextBtn.style.display = 'none';
                    return;
                }

                if (imageEl) {
                    imageEl.src = '/upload/' + images[currentIndex];
                    imageEl.style.display = 'block';
                }

                if (placeholder) {
                    placeholder.style.display = 'none';
                }

                if (badge) {
                    badge.style.display = 'flex';
                    badge.textContent = (currentIndex + 1) + ' / ' + images.length;
                }

                if (prevBtn && nextBtn) {
                    if (images.length > 1) {
                        prevBtn.style.display = 'flex';
                        nextBtn.style.display = 'flex';
                    } else {
                        prevBtn.style.display = 'none';
                        nextBtn.style.display = 'none';
                    }
                }
            }

            if (prevBtn) {
                prevBtn.addEventListener('click', function () {
                    if (images.length <= 1) return;

                    currentIndex--;

                    if (currentIndex < 0) {
                        currentIndex = images.length - 1;
                    }

                    updateImage();
                });
            }

            if (nextBtn) {
                nextBtn.addEventListener('click', function () {
                    if (images.length <= 1) return;

                    currentIndex++;

                    if (currentIndex >= images.length) {
                        currentIndex = 0;
                    }

                    updateImage();
                });
            }

            updateImage();
        });
    }

    function toggleFeedFilter() {
        if (!filterInner) return;

        const isClosed = filterInner.style.display === 'none' || filterInner.style.display === '';

        if (isClosed) {
            filterInner.style.display = 'flex';

            if (filterBar) {
                filterBar.classList.remove('is-closed');
            }

            if (filterToggleIcon) {
                filterToggleIcon.innerText = '접기 －';
            }
        } else {
            filterInner.style.display = 'none';

            if (filterBar) {
                filterBar.classList.add('is-closed');
            }

            if (filterToggleIcon) {
                filterToggleIcon.innerText = '펼치기 ＋';
            }
        }
    }

    function applyFilter(selectedTag) {
        const feedCards = document.querySelectorAll('.feed-card');
        let visibleCount = 0;

        feedCards.forEach(function (card) {
            const cardTags = card.dataset.tags || '';

            if (selectedTag === 'all' || cardTags.includes(selectedTag)) {
                card.style.display = 'block';
                visibleCount++;
            } else {
                card.style.display = 'none';
            }
        });

        if (feedEmpty) {
            feedEmpty.style.display = visibleCount === 0 ? 'block' : 'none';
        }
    }

    removeDuplicateTagButtons();
    renderFeedContentAndLink();
    renderFeedImages();
    initLikeButtons();

    if (filterSummary) {
        filterSummary.addEventListener('click', toggleFeedFilter);

        filterSummary.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                toggleFeedFilter();
            }
        });
    }

    if (filterInner) {
        filterInner.addEventListener('click', function (event) {
            if (!event.target.classList.contains('feed-tag-btn')) return;

            const tagButtons = document.querySelectorAll('.feed-tag-btn');

            tagButtons.forEach(function (button) {
                button.classList.remove('active');
            });

            event.target.classList.add('active');

            const selectedTag = event.target.dataset.tag;
            applyFilter(selectedTag);
        });
    }

    document.querySelectorAll('.feed-hashtag-btn').forEach(function (button) {
        button.addEventListener('click', function () {
            const selectedTag = button.dataset.tag;

            document.querySelectorAll('.feed-tag-btn').forEach(function (tagButton) {
                tagButton.classList.remove('active');

                if (tagButton.dataset.tag === selectedTag) {
                    tagButton.classList.add('active');
                }
            });

            applyFilter(selectedTag);

            if (filterInner) {
                filterInner.style.display = 'flex';
            }

            if (filterBar) {
                filterBar.classList.remove('is-closed');
            }

            if (filterToggleIcon) {
                filterToggleIcon.innerText = '접기 －';
            }
        });
    });

    document.querySelectorAll('.feed-more-btn').forEach(function (button) {
        button.addEventListener('click', function (event) {
            event.stopPropagation();

            const currentMenu = button.closest('.feed-more-wrap').querySelector('.feed-more-menu');

            document.querySelectorAll('.feed-more-menu').forEach(function (menu) {
                if (menu !== currentMenu) {
                    menu.classList.remove('is-open');
                }
            });

            currentMenu.classList.toggle('is-open');
        });
    });

    document.addEventListener('click', function () {
        document.querySelectorAll('.feed-more-menu').forEach(function (menu) {
            menu.classList.remove('is-open');
        });
    });

    document.querySelectorAll('.feed-menu-item').forEach(function (button) {
        button.addEventListener('click', function (event) {
            event.stopPropagation();

            if (button.classList.contains('danger')) {
                alert('삭제 기능은 컨트롤러 연결 후 동작합니다.');
            } else {
                alert('수정 기능은 컨트롤러 연결 후 동작합니다.');
            }
        });
    });

    document.querySelectorAll('.feed-comment-count').forEach(function (button) {
        button.addEventListener('click', function () {
            const card = button.closest('.feed-card');
            const commentList = card.querySelector('.feed-comment-list');

            if (!commentList) return;

            commentList.classList.toggle('is-open');

            if (commentList.classList.contains('is-open')) {
                button.textContent = '댓글 접기';
            } else {
                button.textContent = '댓글 0개 모두 보기';
            }
        });
    });
    function initLikeButtons() {
    const likeButtons = document.querySelectorAll('.feed-like-btn');

    likeButtons.forEach(function (button) {
        const icon = button.querySelector('.feed-like-icon');
        const countText = button.querySelector('.feed-like-count');

        button.addEventListener('click', function () {
            const isLiked = button.dataset.liked === 'true';
            let count = Number(button.dataset.likeCount || 0);

            if (isLiked) {
                count = Math.max(0, count - 1);
                button.dataset.liked = 'false';
                button.classList.remove('is-liked');
                icon.textContent = '♡';
            } else {
                count = count + 1;
                button.dataset.liked = 'true';
                button.classList.add('is-liked');
                icon.textContent = '♥';
            }

            button.dataset.likeCount = count;
            countText.textContent = count;
        });
    });
}

});
</script>

</body>
</html>
