<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beauminity - 피드</title>

    <meta th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}" />
    <meta
      th:if="${_csrf != null}"
      name="_csrf_header"
      th:content="${_csrf.headerName}"
    />

    <link rel="stylesheet" th:href="@{/css/feed/feed.css}" />
    <link rel="stylesheet" th:href="@{/css/common/main.css}" />

    <style>
      .feed-card > .feed-profile-header {
        width: 100%;
        display: flex !important;
        align-items: center !important;
        justify-content: space-between !important;
        padding: 16px 18px 14px 18px !important;
        margin: 0 !important;
        box-sizing: border-box !important;
        background: #ffffff !important;
        border-bottom: 1px solid #f0f0f0 !important;
      }

      .feed-profile-left {
        display: flex !important;
        align-items: center !important;
        gap: 12px !important;
        flex: 1 !important;
        min-width: 0 !important;
      }

      .feed-profile-avatar {
        width: 40px !important;
        height: 40px !important;
        min-width: 40px !important;
        min-height: 40px !important;
        border-radius: 50% !important;
        background: linear-gradient(
          135deg,
          #fa6e68 0%,
          #facb47 100%
        ) !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        color: #ffffff !important;
        font-size: 14px !important;
        font-weight: 900 !important;
        line-height: 1 !important;
        flex: 0 0 40px !important;
        box-shadow: 0 3px 8px rgba(250, 110, 104, 0.2) !important;
      }

      .feed-profile-info {
        display: flex !important;
        flex-direction: column !important;
        justify-content: center !important;
        min-width: 0 !important;
        flex: 1 !important;
      }

      .feed-profile-nickname {
        font-size: 14px !important;
        font-weight: 900 !important;
        color: #111111 !important;
        line-height: 1.2 !important;
        margin: 0 0 6px 0 !important;
        white-space: nowrap !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
      }

      .feed-profile-tags {
        display: flex !important;
        align-items: center !important;
        gap: 6px !important;
        flex-wrap: wrap !important;
      }

      .feed-profile-tag {
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        height: 21px !important;
        padding: 0 8px !important;
        border-radius: 3px !important;
        box-sizing: border-box !important;
        font-size: 11px !important;
        font-weight: 700 !important;
        line-height: 1 !important;
        white-space: nowrap !important;
      }

      .feed-profile-tag.skin {
        background: #fff8db !important;
        border: 1px solid #f0df9a !important;
        color: #7a6500 !important;
      }

      .feed-profile-tag.color {
        background: #fff0ee !important;
        border: 1px solid #f3c4bf !important;
        color: #e1726c !important;
      }

      .feed-profile-header .feed-more-wrap {
        position: relative !important;
        flex: 0 0 auto !important;
        margin-left: 12px !important;
      }

      .feed-profile-header .feed-more-btn {
        border: none !important;
        background: transparent !important;
        color: #8b8b8b !important;
        font-size: 20px !important;
        font-weight: 900 !important;
        line-height: 1 !important;
        padding: 0 2px !important;
        margin: 0 !important;
        cursor: pointer !important;
      }

      .feed-profile-header .feed-more-btn:hover {
        color: #333333 !important;
      }

      .feed-created-date {
        width: 100%;
        display: flex;
        justify-content: flex-end;
        padding: 8px 18px 0 18px;
        box-sizing: border-box;
        background: #ffffff;
      }

      .feed-created-date span {
        font-size: 12px;
        font-weight: 600;
        color: #9a9a9a;
        line-height: 1;
      }

      .feed-like-btn.is-liked .feed-like-icon {
        color: #111 !important;
      }

      .feed-comment-box {
        width: 100%;
        margin-top: 10px;
      }

      .feed-comment-form {
        width: 100%;
        display: flex;
        align-items: stretch;
        gap: 8px;
      }

      .feed-comment-form input[type="text"] {
        flex: 1;
        height: 42px;
        box-sizing: border-box;
      }

      .feed-comment-form .comment-submit-btn {
        height: 42px;
        min-width: 58px;
        padding: 0 16px;
        border-radius: 999px;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .feed-comment-list {
        width: 100%;
        margin-top: 10px;
        box-sizing: border-box;
      }

      .feed-comment-item {
        width: 100%;
        margin-bottom: 8px;
        box-sizing: border-box;
      }

      .feed-comment-bubble {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 10px;
        background: #f8f6f2;
        border-radius: 14px;
        padding: 10px 14px;
        box-sizing: border-box;
        cursor: pointer;
      }

      .feed-comment-bubble:hover {
        background: #f3f0ea;
      }

      .feed-comment-avatar {
        width: 30px;
        height: 30px;
        min-width: 30px;
        border-radius: 50%;
        background: #f8dfe3;
        color: #7a7680;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 800;
        flex-shrink: 0;
      }

      .feed-comment-main {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        overflow: hidden;
      }

      .feed-comment-writer {
        font-size: 13px;
        font-weight: 900;
        color: #222222;
        flex-shrink: 0;
      }

      .feed-comment-content {
        font-size: 13px;
        font-weight: 500;
        color: #5f6b7a;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .feed-comment-empty {
        width: 100%;
        padding: 12px;
        color: #999999;
        font-size: 13px;
        text-align: center;
        border: 1px dashed #e5e5e5;
        border-radius: 12px;
        box-sizing: border-box;
      }

      /* 대댓글: 부모댓글 바로 아래로 내려가는 구조 */
      .comment-child-list {
        width: 100%;
        margin: 6px 0 0 0;
        padding-left: 42px;
        box-sizing: border-box;
      }

      .comment-child-list:empty {
        display: none;
      }

      .comment-child-item {
        position: relative;
        width: 100%;
        margin-top: 7px;
        padding-left: 18px;
        box-sizing: border-box;
      }

      /* 아래로 내려와 꺾이는 화살표 느낌 */
      .comment-child-item::before {
        content: "";
        position: absolute;
        left: 0;
        top: -7px;
        width: 14px;
        height: 24px;
        border-left: 2px solid #ded8cf;
        border-bottom: 2px solid #ded8cf;
        border-bottom-left-radius: 8px;
        box-sizing: border-box;
      }

      .comment-child-bubble {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 8px;
        background: #fbfaf7;
        border-radius: 12px;
        padding: 8px 10px;
        box-sizing: border-box;
        cursor: pointer;
      }

      .comment-child-bubble:hover {
        background: #f3f0ea;
      }

      .comment-child-avatar {
        width: 24px;
        height: 24px;
        min-width: 24px;
        border-radius: 50%;
        background: #fff0ee;
        color: #7a7680;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 900;
        flex-shrink: 0;
      }

      .comment-child-main {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 7px;
        overflow: hidden;
      }

      .comment-child-writer {
        font-size: 12px;
        font-weight: 900;
        color: #222222;
        flex-shrink: 0;
      }

      .comment-child-content {
        font-size: 12px;
        font-weight: 500;
        color: #5f6b7a;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .comment-more-wrap {
        position: relative;
        display: none;
        margin-left: auto;
        flex-shrink: 0;
      }

      .comment-more-btn {
        width: 24px;
        height: 24px;
        border: none;
        background: transparent;
        color: #8f8f8f;
        font-size: 17px;
        font-weight: 800;
        cursor: pointer;
        border-radius: 50%;
        line-height: 1;
        padding: 0;
      }

      .comment-more-btn:hover {
        background: #eeeeee;
        color: #333333;
      }

      .comment-more-menu {
        display: none;
        position: absolute;
        top: 28px;
        right: 0;
        min-width: 90px;
        background: #ffffff;
        border: 1px solid #ececec;
        border-radius: 10px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
        padding: 6px;
        z-index: 50;
      }

      .comment-more-menu.is-open {
        display: block;
      }

      .comment-menu-item {
        width: 100%;
        border: none;
        background: transparent;
        text-align: left;
        padding: 8px 10px;
        font-size: 12px;
        font-weight: 700;
        border-radius: 8px;
        cursor: pointer;
        color: #333333;
      }

      .comment-menu-item:hover {
        background: #f7f7f7;
      }

      .comment-menu-item.danger {
        color: #e05d56;
      }

      .comment-menu-item.danger:hover {
        background: #fff1ef;
      }

      .comment-reply-target {
        display: none;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        width: 100%;
        margin-bottom: 8px;
        padding: 9px 12px;
        border-radius: 12px;
        background: #fafafa;
        border: 1px solid #eeeeee;
        box-sizing: border-box;
      }

      .comment-reply-target.is-active {
        display: flex;
      }

      .comment-reply-target-text {
        flex: 1;
        min-width: 0;
        font-size: 12px;
        line-height: 1.4;
        color: #666666;
      }

      .comment-reply-target-writer {
        font-weight: 900;
        color: #111111;
      }

      .comment-reply-target-content {
        display: block;
        margin-top: 2px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .comment-reply-cancel-btn {
        width: 20px;
        height: 20px;
        min-width: 20px;
        padding: 0;
        border: none;
        border-radius: 50%;
        background: #fff0ee;
        color: #fa6e68;
        font-size: 16px;
        font-weight: 900;
        line-height: 1;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .comment-reply-cancel-btn:hover {
        background: #fa6e68;
        color: #ffffff;
      }
    </style>
  </head>

  <body th:data-login-username="${#authentication.name}">
    <header th:replace="~{layout/header :: header}"></header>

    <div class="feed-filter-bar is-closed" id="feed-filter-bar">
      <div
        class="feed-filter-summary"
        id="feed-filter-summary"
        role="button"
        tabindex="0"
      >
        <div>
          <strong>해시태그로 피드 보기</strong>
          <span>궁금한 태그를 열어서 관련 피드만 모아보세요.</span>
        </div>
        <em id="feed-filter-toggle-icon">펼치기 ＋</em>
      </div>

      <div
        class="feed-filter-inner"
        id="feed-filter-inner"
        aria-label="해시태그 필터"
        style="display: none"
      >
        <button type="button" class="feed-tag-btn active" data-tag="all">
          #전체
        </button>

        <button
          type="button"
          class="feed-tag-btn"
          th:each="tagName : ${tagList}"
          th:data-tag="${tagName}"
          th:text="'#' + ${tagName}"
        >
          #해시태그
        </button>
      </div>
    </div>

    <main>
      <div class="main-left-content">
        <section class="dashboard-section">
          <div class="section-header feed-section-header">
            <h2>
              📸 BOTD
              <span>사용자의 데일리 루틴과 사용샷을 모아보는 공간입니다.</span>
            </h2>

            <button
              class="feed-write-top-btn"
              type="button"
              th:onclick="|location.href='@{/feed/write}'|"
            >
              피드 작성하기
            </button>
          </div>

          <div class="feed-list" id="feed-list-container">
            <article
              class="feed-card"
              th:each="feed : ${feedList}"
              th:data-feed-id="${feed.feedId}"
              th:data-username="${feed.username}"
              th:data-skin-type="${feed.skinType}"
              th:data-personal-color="${feed.personalColor}"
              th:data-content="${feed.feedContent}"
              th:data-images="${feed.feedFileList != null ? #strings.listJoin(feed.feedFileList, ',') : ''}"
              th:data-tags="${feed.feedTagList != null ? #strings.listJoin(feed.feedTagList, ',') : ''}"
            >
              <div class="feed-card-top feed-profile-header">
                <div class="feed-profile-left">
                  <div class="feed-profile-avatar">
                    <span
                      th:text="${feed.nickname != null and feed.nickname != '' ? #strings.substring(feed.nickname, 0, 1) : 'O'}"
                      >O</span
                    >
                  </div>

                  <div class="feed-profile-info">
                    <div
                      class="feed-profile-nickname"
                      th:text="${feed.nickname != null ? feed.nickname : feed.username}"
                    >
                      닉네임
                    </div>

                    <div class="feed-profile-tags">
                      <span
                        class="feed-profile-tag skin"
                        th:text="${feed.skinType != null ? feed.skinType : '피부타입'}"
                      >
                        피부타입
                      </span>
                      <span
                        class="feed-profile-tag color"
                        th:text="${feed.personalColor != null ? feed.personalColor : '퍼스널컬러'}"
                      >
                        퍼스널컬러
                      </span>
                    </div>
                  </div>
                </div>

                <div class="feed-more-wrap">
                  <button type="button" class="feed-more-btn">···</button>
                  <div class="feed-more-menu">
                    <button type="button" class="feed-menu-item edit-btn">
                      수정하기
                    </button>

                    <button type="button" class="feed-menu-item danger">
                      삭제하기
                    </button>
                  </div>
                </div>
              </div>

              <div class="feed-card-image">
                <button type="button" class="feed-photo-arrow feed-photo-prev">
                  ‹
                </button>

                <img
                  alt="피드 이미지"
                  class="feed-image js-feed-image"
                  style="display: none"
                />

                <div class="feed-image-placeholder js-feed-placeholder">
                  📸 <span>이미지 준비중</span>
                </div>

                <button type="button" class="feed-photo-arrow feed-photo-next">
                  ›
                </button>

                <div class="feed-photo-badge js-photo-badge">1 / 1</div>
              </div>

              <div class="feed-created-date">
                <span
                  th:text="${feed.createdAt != null ? #temporals.format(feed.createdAt, 'yyyy.MM.dd') : ''}"
                >
                  2026.06.22
                </span>
              </div>

              <div class="feed-card-content">
                <div class="feed-card-actions">
                  <div class="action-left">
                    <button
                      type="button"
                      class="feed-like-btn"
                      th:classappend="${feed.liked != null and feed.liked} ? ' is-liked' : ''"
                      th:data-liked="${feed.liked != null ? feed.liked : false}"
                      th:data-like-count="${feed.likeCnt != null ? feed.likeCnt : 0}"
                    >
                      <span
                        class="feed-like-icon"
                        th:text="${feed.liked != null and feed.liked} ? '♥' : '♡'"
                      >
                        ♡
                      </span>
                    </button>

                    <button
                      type="button"
                      class="feed-comment-toggle-btn"
                      th:data-comment-count="${feed.replyCnt != null ? feed.replyCnt : 0}"
                    >
                      <span class="feed-comment-icon">💬</span>
                    </button>

                    <a
                      class="feed-info-link feed-share-link"
                      href="#"
                      target="_blank"
                      rel="noopener noreferrer"
                      style="display: none"
                    >
                      정보 공유 바로가기 ↗
                    </a>
                  </div>
                </div>

                <div class="feed-likes-count-text">
                  좋아요
                  <span
                    class="feed-like-count"
                    th:text="${feed.likeCnt != null ? feed.likeCnt : 0}"
                  >
                    0
                  </span>
                  개
                </div>

                <p class="feed-card-caption">
                  <span class="js-caption-text"></span>
                </p>

                <div class="feed-card-tags">
                  <button
                    type="button"
                    class="feed-hashtag-btn"
                    th:each="tagName : ${feed.feedTagList}"
                    th:data-tag="${tagName}"
                    th:text="'#' + ${tagName}"
                  >
                    #BOTD
                  </button>
                </div>

                <button
                  type="button"
                  class="feed-comment-count"
                  th:data-comment-count="${feed.replyCnt != null ? feed.replyCnt : 0}"
                >
                  댓글 0개 모두 보기
                </button>

                <div class="feed-comment-list">
                  <div
                    class="feed-comment-item feed-comment-empty"
                    th:if="${feed.feedReplyList == null or #lists.isEmpty(feed.feedReplyList)}"
                  >
                    <span>아직 등록된 댓글이 없습니다.</span>
                  </div>

                  <!-- 부모 댓글만 출력 -->
                  <div
                    class="feed-comment-item"
                    th:if="${feed.feedReplyList != null and reply.parentsReplyId == null}"
                    th:each="reply : ${feed.feedReplyList}"
                    th:data-reply-id="${reply.replyId}"
                    th:data-username="${reply.username}"
                  >
                    <div class="feed-comment-bubble">
                      <div class="feed-comment-avatar">
                        <span
                          th:text="${reply.nickname != null and reply.nickname != '' ? #strings.substring(reply.nickname, 0, 1) : '회'}"
                          >회</span
                        >
                      </div>

                      <div class="feed-comment-main">
                        <strong
                          class="feed-comment-writer"
                          th:text="${reply.nickname != null and reply.nickname != '' ? reply.nickname : reply.username}"
                        >
                          닉네임
                        </strong>

                        <span
                          class="feed-comment-content"
                          th:text="${reply.replyContent}"
                        >
                          댓글 내용
                        </span>
                      </div>

                      <div
                        class="comment-more-wrap"
                        th:if="${#authentication.name == reply.username}"
                      >
                        <button type="button" class="comment-more-btn">
                          ···
                        </button>

                        <div class="comment-more-menu">
                          <button
                            type="button"
                            class="comment-menu-item comment-edit-btn"
                          >
                            수정하기
                          </button>
                          <button
                            type="button"
                            class="comment-menu-item danger comment-delete-btn"
                          >
                            삭제하기
                          </button>
                        </div>
                      </div>
                    </div>

                    <!-- 해당 부모댓글의 대댓글 -->
                    <div class="comment-child-list">
                      <div
                        class="comment-child-item"
                        th:each="child : ${feed.feedReplyList}"
                        th:if="${child.parentsReplyId != null and child.parentsReplyId == reply.replyId}"
                        th:data-reply-id="${child.replyId}"
                        th:data-username="${child.username}"
                      >
                        <div class="comment-child-bubble">
                          <div class="comment-child-avatar">
                            <span
                              th:text="${child.nickname != null and child.nickname != '' ? #strings.substring(child.nickname, 0, 1) : '회'}"
                              >회</span
                            >
                          </div>

                          <div class="comment-child-main">
                            <strong
                              class="comment-child-writer"
                              th:text="${child.nickname != null and child.nickname != '' ? child.nickname : child.username}"
                            >
                              닉네임
                            </strong>

                            <span
                              class="comment-child-content"
                              th:text="${child.replyContent}"
                            >
                              대댓글 내용
                            </span>
                          </div>

                          <div
                            class="comment-more-wrap"
                            th:if="${#authentication.name == child.username}"
                          >
                            <button type="button" class="comment-more-btn">
                              ···
                            </button>

                            <div class="comment-more-menu">
                              <button
                                type="button"
                                class="comment-menu-item comment-edit-btn"
                              >
                                수정하기
                              </button>
                              <button
                                type="button"
                                class="comment-menu-item danger comment-delete-btn"
                              >
                                삭제하기
                              </button>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="feed-comment-box">
                  <div class="comment-reply-target">
                    <div class="comment-reply-target-text">
                      <span class="comment-reply-target-writer"></span>님에게
                      답글 남기는 중
                      <span class="comment-reply-target-content"></span>
                    </div>
                    <button type="button" class="comment-reply-cancel-btn">
                      ×
                    </button>
                  </div>

                  <form
                    class="feed-comment-form"
                    th:action="@{/feed/{feedId}/reply(feedId=${feed.feedId})}"
                    method="post"
                  >
                    <input
                      type="hidden"
                      name="parentsReplyId"
                      class="reply-parent-id-input"
                      value=""
                    />
                    <input
                      type="text"
                      name="replyContent"
                      placeholder="댓글 달기..."
                      autocomplete="off"
                    />
                    <button type="submit" class="comment-submit-btn">
                      게시
                    </button>
                  </form>
                </div>
              </div>
            </article>
          </div>

          <div
            class="feed-empty"
            id="feed-empty"
            th:if="${feedList == null or #lists.isEmpty(feedList)}"
          >
            등록된 피드가 없습니다. 첫 번째 피드를 작성해보세요!
          </div>
        </section>
      </div>
